<!doctype html>
<html data-ui-version="__UI_VERSION__">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Canvas Widget</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ef;
        --panel: #ffffff;
        --ink: #1a1816;
        --muted: #6d665e;
        --line: #ded8cf;
        --brand: #e8742a;
        --danger: #9b2d30;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 15% 0%, #f3dfd1, transparent 44%), var(--bg);
        color: var(--ink);
        font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .shell {
        width: min(720px, 100% - 24px);
        margin: 18px auto;
        background: color-mix(in srgb, var(--panel) 86%, transparent);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 12px 36px rgba(37, 28, 22, 0.08);
        overflow: hidden;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .status {
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .body {
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      .boot {
        padding: 16px;
        display: grid;
        gap: 10px;
      }

      .bootLine {
        height: 12px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--line) 70%, #fff);
      }

      .bootLine.wide {
        width: 88%;
      }

      .bootLine.mid {
        width: 64%;
      }

      .bootLine.short {
        width: 42%;
      }

      .card,
      .cardDesc,
      .prompt,
      .error {
        margin: 0;
        white-space: pre-wrap;
      }

      .cardDesc {
        color: #3e3833;
      }

      .richContent {
        display: grid;
        gap: 10px;
      }

      .richP {
        margin: 0;
      }

      .richHeading {
        margin: 0;
        font-weight: 700;
      }

      .richList {
        margin: 0;
        padding-left: 18px;
      }

      .prestartWelcome {
        display: grid;
        gap: 10px;
      }

      .prestartHeadline,
      .prestartBlock,
      .prestartBlockTitle,
      .prestartBlockBody,
      .prestartMetaLabel,
      .prestartMetaValue {
        margin: 0;
      }

      .prestartBlockTitle {
        font-weight: 700;
      }

      .prestartOutcomes {
        margin: 0;
        padding-left: 18px;
      }

      .prestartMetaGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .prestartMetaItem {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: color-mix(in srgb, var(--panel) 94%, transparent);
      }

      .prestartMetaLabel {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .prestartMetaValue {
        font-size: 16px;
        font-weight: 600;
      }

      .subtitle {
        width: min(720px, 100% - 24px);
        margin: 6px auto 16px;
        color: var(--muted);
        font-size: 12px;
      }

      .prompt {
        border-top: 1px dashed var(--line);
        padding-top: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid color-mix(in srgb, var(--brand) 35%, #0000);
        border-radius: 999px;
        background: color-mix(in srgb, var(--brand) 14%, #fff);
        color: #4d2208;
        font: inherit;
        font-weight: 600;
        padding: 8px 14px;
        cursor: pointer;
      }

      button[disabled] {
        opacity: 0.5;
        cursor: default;
      }

      .input {
        display: grid;
        gap: 8px;
      }

      textarea {
        width: 100%;
        min-height: 92px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        background: #fff;
      }

      .error {
        color: var(--danger);
        border: 1px solid color-mix(in srgb, var(--danger) 30%, #0000);
        border-radius: 12px;
        padding: 10px 12px;
        background: color-mix(in srgb, var(--danger) 6%, #fff);
      }

      .is-hidden {
        display: none !important;
      }

      @media (max-width: 640px) {
        .shell {
          width: calc(100% - 16px);
          margin: 10px auto;
          border-radius: 12px;
        }

        .subtitle {
          width: calc(100% - 16px);
          margin: 4px auto 12px;
        }

        .prestartMetaGrid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="bar">
        <div class="status" id="status"></div>
        <div class="meta" id="meta"></div>
      </header>
      <div class="boot" id="boot">
        <div class="bootLine wide"></div>
        <div class="bootLine mid"></div>
        <div class="bootLine short"></div>
      </div>
      <main class="body is-hidden" id="body">
        <p class="card" id="card"></p>
        <div class="cardDesc is-hidden" id="cardDesc"></div>
        <p class="prompt" id="prompt"></p>
        <div class="actions" id="actions"></div>
        <form class="input" id="inputForm">
          <textarea id="inputText"></textarea>
          <button type="submit" id="inputSend"></button>
        </form>
        <p class="error" id="error"></p>
      </main>
    </div>
    <p class="subtitle is-hidden" id="uiSubtitle"></p>

    <script>
      (function () {
        "use strict";

        var CONTRACT_FAIL_TEXT = "UI contract violation. Refresh and retry.";
        var MODE_SET = new Set(["prestart", "interactive", "waiting_locale", "recovery", "blocked", "failed"]);

        function byId(id) {
          return document.getElementById(id);
        }

        var ui = {
          status: byId("status"),
          meta: byId("meta"),
          body: byId("body"),
          boot: byId("boot"),
          card: byId("card"),
          cardDesc: byId("cardDesc"),
          prompt: byId("prompt"),
          actions: byId("actions"),
          inputForm: byId("inputForm"),
          inputText: byId("inputText"),
          inputSend: byId("inputSend"),
          error: byId("error"),
          uiSubtitle: byId("uiSubtitle"),
        };

        var runtime = {
          state: {},
          mode: "",
          loading: false,
          actions: [],
          textSubmit: null,
        };

        function toRecord(value) {
          if (!value || typeof value !== "object" || Array.isArray(value)) return {};
          return value;
        }

        function asText(value) {
          return String(value == null ? "" : value).trim();
        }

        function escapeHtml(text) {
          return String(text == null ? "" : text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function formatText(text) {
          return escapeHtml(text).replaceAll("\n", "<br>");
        }

        function richHtmlFromText(text) {
          var source = asText(text);
          if (!source) return "";
          var lines = source.replaceAll("\r\n", "\n").split("\n");
          var blocks = [];
          var current = [];
          for (var i = 0; i < lines.length; i += 1) {
            var line = lines[i];
            if (asText(line).length === 0) {
              if (current.length > 0) {
                blocks.push(current);
                current = [];
              }
              continue;
            }
            current.push(line);
          }
          if (current.length > 0) blocks.push(current);
          if (blocks.length === 0) return "";

          var html = '<div class="richContent">';
          for (var j = 0; j < blocks.length; j += 1) {
            var block = blocks[j];
            var allOrdered = true;
            var allBullets = true;
            var orderedItems = [];
            var bulletItems = [];
            for (var k = 0; k < block.length; k += 1) {
              var orderedMatch = block[k].match(/^\s*\d+[\.\)]\s+(.+)$/);
              var bulletMatch = block[k].match(/^\s*[-*•]\s+(.+)$/);
              if (orderedMatch) orderedItems.push(orderedMatch[1]);
              else allOrdered = false;
              if (bulletMatch) bulletItems.push(bulletMatch[1]);
              else allBullets = false;
            }

            if (allOrdered && orderedItems.length > 0) {
              html += '<ol class="richList">';
              for (var oi = 0; oi < orderedItems.length; oi += 1) {
                html += "<li>" + escapeHtml(orderedItems[oi]) + "</li>";
              }
              html += "</ol>";
              continue;
            }

            if (allBullets && bulletItems.length > 0) {
              html += '<ul class="richList">';
              for (var bi = 0; bi < bulletItems.length; bi += 1) {
                html += "<li>" + escapeHtml(bulletItems[bi]) + "</li>";
              }
              html += "</ul>";
              continue;
            }

            if (block.length === 1 && /[:?]$/.test(asText(block[0])) && asText(block[0]).length <= 120) {
              html += '<p class="richHeading">' + escapeHtml(block[0]) + "</p>";
              continue;
            }

            html += '<p class="richP">' + formatText(block.join("\n")) + "</p>";
          }
          html += "</div>";
          return html;
        }

        function uiString(state, key) {
          var strings = toRecord(state.ui_strings);
          return asText(strings[key]);
        }

        function setHidden(el, hidden) {
          if (!el) return;
          el.classList.toggle("is-hidden", Boolean(hidden));
        }

        function setLoading(loading) {
          runtime.loading = Boolean(loading);
          var disabled = runtime.loading;
          if (ui.inputText) ui.inputText.disabled = disabled;
          if (ui.inputSend) ui.inputSend.disabled = disabled;
          if (ui.actions) {
            var buttons = ui.actions.querySelectorAll("button");
            for (var i = 0; i < buttons.length; i += 1) {
              buttons[i].disabled = disabled;
            }
          }
        }

        function failClosed(reason, detail) {
          document.body.setAttribute("data-ui-marker", reason);
          console.warn("[ui_fail_closed]", {
            reason: reason,
            detail: detail || {},
          });
          setHidden(ui.boot, true);
          setHidden(ui.body, false);
          if (ui.status) ui.status.textContent = "";
          if (ui.meta) ui.meta.textContent = "";
          if (ui.card) ui.card.textContent = "";
          if (ui.cardDesc) ui.cardDesc.innerHTML = "";
          if (ui.prompt) ui.prompt.textContent = "";
          if (ui.actions) ui.actions.innerHTML = "";
          if (ui.inputText) ui.inputText.value = "";
          if (ui.error) ui.error.textContent = CONTRACT_FAIL_TEXT + " [" + reason + "]";
          setHidden(ui.error, false);
          setHidden(ui.card, true);
          setHidden(ui.prompt, true);
          setHidden(ui.actions, true);
          setHidden(ui.inputForm, true);
          setLoading(false);
        }

        function bodyTextFromResult(result) {
          var text = asText(result.text);
          if (text) return text;
          var specialist = toRecord(result.specialist);
          return asText(specialist.message) || asText(specialist.refined_formulation) || asText(specialist.question);
        }

        function prestartMarkupFromState(state) {
          var headline = uiString(state, "prestart.headline");
          var provenTitle = uiString(state, "prestart.proven.title");
          var provenBody = uiString(state, "prestart.proven.body");
          var outcomesTitle = uiString(state, "prestart.outcomes.title");
          var outcome1 = uiString(state, "prestart.outcomes.item1");
          var outcome2 = uiString(state, "prestart.outcomes.item2");
          var outcome3 = uiString(state, "prestart.outcomes.item3");
          var howLabel = uiString(state, "prestart.meta.how.label");
          var howValue = uiString(state, "prestart.meta.how.value");
          var timeLabel = uiString(state, "prestart.meta.time.label");
          var timeValue = uiString(state, "prestart.meta.time.value");
          var hasContent =
            headline ||
            provenTitle ||
            provenBody ||
            outcomesTitle ||
            outcome1 ||
            outcome2 ||
            outcome3 ||
            howLabel ||
            howValue ||
            timeLabel ||
            timeValue;
          if (!hasContent) return "";
          var outcomeItems = [outcome1, outcome2, outcome3].filter(Boolean);
          var outcomesHtml = "";
          if (outcomesTitle || outcomeItems.length > 0) {
            outcomesHtml = '<div class="prestartBlock">';
            if (outcomesTitle) outcomesHtml += '<p class="prestartBlockTitle">' + escapeHtml(outcomesTitle) + "</p>";
            if (outcomeItems.length > 0) {
              outcomesHtml += '<ul class="prestartOutcomes">';
              for (var i = 0; i < outcomeItems.length; i += 1) {
                outcomesHtml += "<li>" + escapeHtml(outcomeItems[i]) + "</li>";
              }
              outcomesHtml += "</ul>";
            }
            outcomesHtml += "</div>";
          }
          var metaHtml = "";
          if (howLabel || howValue || timeLabel || timeValue) {
            metaHtml =
              '<div class="prestartMetaGrid">' +
              '<div class="prestartMetaItem">' +
              '<p class="prestartMetaLabel">' +
              escapeHtml(howLabel) +
              "</p>" +
              '<p class="prestartMetaValue">' +
              escapeHtml(howValue) +
              "</p>" +
              "</div>" +
              '<div class="prestartMetaItem">' +
              '<p class="prestartMetaLabel">' +
              escapeHtml(timeLabel) +
              "</p>" +
              '<p class="prestartMetaValue">' +
              escapeHtml(timeValue) +
              "</p>" +
              "</div>" +
              "</div>";
          }
          return (
            '<div class="prestartWelcome">' +
            '<p class="prestartHeadline">' +
            escapeHtml(headline) +
            "</p>" +
            '<div class="prestartBlock">' +
            '<p class="prestartBlockTitle">' +
            escapeHtml(provenTitle) +
            "</p>" +
            '<p class="prestartBlockBody">' +
            escapeHtml(provenBody) +
            "</p>" +
            "</div>" +
            outcomesHtml +
            metaHtml +
            "</div>"
          );
        }

        function extractWidgetResult(raw) {
          var root = toRecord(raw);
          var structured = toRecord(root.structuredContent);
          var toolOutput = toRecord(root.toolOutput);
          var toolResponseMetadata = toRecord(root.toolResponseMetadata);
          var candidates = [
            toRecord(toRecord(root._meta).widget_result),
            toRecord(toolResponseMetadata.widget_result),
            toRecord(toRecord(toolResponseMetadata._meta).widget_result),
            toRecord(toRecord(structured._meta).widget_result),
            toRecord(toRecord(toolOutput._meta).widget_result),
            toRecord(root.result),
            toRecord(structured.result),
            toRecord(toolOutput.result),
            root,
            structured,
            toolOutput,
          ];
          for (var i = 0; i < candidates.length; i += 1) {
            if (Object.keys(candidates[i]).length > 0) return candidates[i];
          }
          return {};
        }

        function extractWidgetState(raw) {
          var root = toRecord(raw);
          var structured = toRecord(root.structuredContent);
          var structuredResult = toRecord(structured.result);
          var toolOutput = toRecord(root.toolOutput);
          var toolResponseMetadata = toRecord(root.toolResponseMetadata);
          var widget = extractWidgetResult(raw);
          var candidates = [
            toRecord(widget.state),
            toRecord(root.state),
            toRecord(structured.state),
            toRecord(structuredResult.state),
            toRecord(toolOutput.state),
            toRecord(toolResponseMetadata.state),
            toRecord(toRecord(toolResponseMetadata._meta).state),
          ];
          for (var i = 0; i < candidates.length; i += 1) {
            if (Object.keys(candidates[i]).length > 0) return candidates[i];
          }
          return {};
        }

        function renderBootstrapPreview(rawPayload) {
          var state = extractWidgetState(rawPayload);
          var strings = toRecord(state.ui_strings);
          if (Object.keys(strings).length === 0) return false;
          runtime.state = state;
          runtime.mode = "prestart";
          runtime.actions = [];
          runtime.textSubmit = null;
          setHidden(ui.boot, true);
          setHidden(ui.body, false);
          setLoading(false);

          var stepId = asText(state.current_step) || "step_0";
          var sectionTitle = uiString(state, "sectionTitle." + stepId) || uiString(state, "title." + stepId) || stepId;
          if (ui.status) ui.status.textContent = sectionTitle;
          if (ui.meta) ui.meta.textContent = "prestart";
          var uiSubtitleText = uiString(state, "uiSubtitle");
          var byText = uiString(state, "byText");
          if (ui.uiSubtitle) {
            var subtitle = [byText, uiSubtitleText].filter(Boolean).join(" · ");
            ui.uiSubtitle.textContent = subtitle;
            setHidden(ui.uiSubtitle, subtitle.length === 0);
          }

          var bodyText = uiString(state, "step0.carddesc") || uiString(state, "prestart.headline") || uiString(state, "prestart.loading");
          var promptText = uiString(state, "startHint");
          if (ui.cardDesc) {
            var prestartMarkup = prestartMarkupFromState(state);
            ui.cardDesc.innerHTML = prestartMarkup || richHtmlFromText(bodyText);
          }
          if (ui.prompt) ui.prompt.textContent = promptText;
          if (ui.card) ui.card.textContent = bodyText;
          setHidden(ui.card, true);
          setHidden(ui.cardDesc, !ui.cardDesc || ui.cardDesc.innerHTML.length === 0);
          setHidden(ui.prompt, promptText.length === 0);
          if (ui.actions) ui.actions.innerHTML = "";
          if (ui.error) ui.error.textContent = "";
          setHidden(ui.actions, true);
          setHidden(ui.inputForm, true);
          setHidden(ui.error, true);
          return true;
        }

        function normalizeAction(raw, strings) {
          var action = toRecord(raw);
          var actionCode = asText(action.action_code).toUpperCase();
          if (!actionCode) return null;
          var label = asText(action.label);
          var labelKey = asText(action.label_key);
          if (!label && labelKey) label = asText(strings[labelKey]);
          if (!label) label = actionCode;
          return {
            actionCode: actionCode,
            role: asText(action.role).toLowerCase(),
            payloadMode: asText(action.payload_mode).toLowerCase(),
            label: label,
          };
        }

        function parseActions(result) {
          var state = toRecord(result.state);
          var strings = toRecord(state.ui_strings);
          var uiPayload = toRecord(result.ui);
          var actionContract = toRecord(uiPayload.action_contract);
          if (!Array.isArray(actionContract.actions)) return [];
          var out = [];
          for (var i = 0; i < actionContract.actions.length; i += 1) {
            var normalized = normalizeAction(actionContract.actions[i], strings);
            if (normalized) out.push(normalized);
          }
          return out;
        }

        function openAiApi() {
          return toRecord(globalThis.openai);
        }

        async function callRunStep(message, extraState) {
          var openai = openAiApi();
          if (typeof openai.callTool !== "function") {
            failClosed("transport_unavailable", {});
            return;
          }
          var nextState = Object.assign({}, runtime.state, toRecord(extraState));
          var payload = {
            current_step_id: asText(nextState.current_step) || "step_0",
            user_message: asText(message),
            input_mode: "widget",
            state: nextState,
          };
          setLoading(true);
          try {
            var response = await openai.callTool("run_step", payload);
            ingest(response, "call_tool");
          } catch (error) {
            console.warn("[ui_call_failed]", { message: String(error && error.message ? error.message : error) });
            failClosed("call_failed", {});
          } finally {
            setLoading(false);
          }
        }

        function renderActions(mode) {
          if (!ui.actions) return;
          ui.actions.innerHTML = "";
          var nonText = [];
          runtime.textSubmit = null;
          for (var i = 0; i < runtime.actions.length; i += 1) {
            var action = runtime.actions[i];
            if (action.role === "text_submit") {
              runtime.textSubmit = action;
              continue;
            }
            nonText.push(action);
          }

          for (var j = 0; j < nonText.length; j += 1) {
            (function (action) {
              var button = document.createElement("button");
              button.type = "button";
              button.textContent = action.label;
              button.disabled = runtime.loading;
              button.addEventListener("click", function () {
                if (runtime.loading) return;
                callRunStep(action.actionCode, {});
              });
              ui.actions.appendChild(button);
            })(nonText[j]);
          }

          var showActionButtons = nonText.length > 0;
          setHidden(ui.actions, !showActionButtons);

          var showInput = mode === "interactive" && runtime.textSubmit && runtime.textSubmit.payloadMode !== "scores";
          if (runtime.textSubmit && runtime.textSubmit.payloadMode === "scores") {
            failClosed("unsupported_payload_mode_scores", { current_step: asText(runtime.state.current_step) || "" });
            return;
          }

          setHidden(ui.inputForm, !showInput);
          if (ui.inputSend) {
            ui.inputSend.textContent = runtime.textSubmit ? runtime.textSubmit.label : "";
          }
        }

        function renderResult(result, source) {
          var state = toRecord(result.state);
          var uiPayload = toRecord(result.ui);
          var view = toRecord(uiPayload.view);
          var mode = asText(view.mode).toLowerCase();
          if (!MODE_SET.has(mode)) {
            failClosed("view_mode_missing", { source: source });
            return;
          }

          runtime.state = state;
          runtime.mode = mode;
          runtime.actions = parseActions(result);
          setHidden(ui.boot, true);
          setHidden(ui.body, false);

          var stepId = asText(state.current_step);
          var sectionTitle = stepId ? uiString(state, "sectionTitle." + stepId) : "";
          var titleFallback = stepId ? uiString(state, "title." + stepId) : "";
          if (ui.status) ui.status.textContent = sectionTitle || titleFallback || stepId || "";
          if (ui.meta) ui.meta.textContent = mode;
          var uiSubtitleText = uiString(state, "uiSubtitle");
          var byText = uiString(state, "byText");
          if (ui.uiSubtitle) {
            var subtitle = [byText, uiSubtitleText].filter(Boolean).join(" · ");
            ui.uiSubtitle.textContent = subtitle;
            setHidden(ui.uiSubtitle, subtitle.length === 0);
          }

          var bodyText = bodyTextFromResult(result);
          var promptText = asText(result.prompt);
          if (mode === "prestart" && promptText.length === 0) {
            promptText = uiString(state, "startHint");
          }
          if (ui.cardDesc) {
            if (mode === "prestart") {
              var prestartMarkup = prestartMarkupFromState(state);
              ui.cardDesc.innerHTML = prestartMarkup || richHtmlFromText(bodyText);
            } else {
              ui.cardDesc.innerHTML = richHtmlFromText(bodyText);
            }
          }
          if (ui.card) ui.card.textContent = bodyText;
          if (ui.prompt) ui.prompt.textContent = promptText;
          setHidden(ui.card, true);
          setHidden(ui.cardDesc, !ui.cardDesc || ui.cardDesc.innerHTML.length === 0);
          setHidden(ui.prompt, promptText.length === 0);

          var errorPayload = toRecord(result.error);
          var errorText = asText(errorPayload.user_message) || asText(errorPayload.message);
          if (mode === "blocked" || mode === "failed") {
            if (!errorText) {
              failClosed("blocked_without_error_message", { mode: mode });
              return;
            }
            if (ui.error) ui.error.textContent = errorText;
            setHidden(ui.error, false);
            setHidden(ui.actions, true);
            setHidden(ui.inputForm, true);
            setLoading(false);
            return;
          }

          if (mode === "prestart") {
            var hasStartAction = false;
            for (var i = 0; i < runtime.actions.length; i += 1) {
              if (runtime.actions[i].role === "start") {
                hasStartAction = true;
                break;
              }
            }
            if (!hasStartAction) {
              failClosed("prestart_missing_start_action", { current_step: asText(state.current_step) || "" });
              return;
            }
          }

          if (mode === "interactive" && runtime.actions.length === 0) {
            failClosed("interactive_missing_actions", { current_step: asText(state.current_step) || "" });
            return;
          }

          if ((mode === "interactive" || mode === "prestart") && bodyText.length === 0 && promptText.length === 0) {
            failClosed("missing_render_text", { mode: mode, current_step: asText(state.current_step) || "" });
            return;
          }

          setHidden(ui.error, true);

          if (mode === "waiting_locale" || mode === "recovery") {
            setHidden(ui.actions, true);
            setHidden(ui.inputForm, true);
          } else {
            renderActions(mode);
          }

          setLoading(false);
        }

        function ingest(rawPayload, source) {
          var result = extractWidgetResult(rawPayload);
          if (Object.keys(result).length === 0) {
            if (renderBootstrapPreview(rawPayload)) return;
            failClosed("widget_result_missing", { source: source });
            return;
          }
          renderResult(result, source);
        }

        function onSubmit(event) {
          event.preventDefault();
          if (runtime.loading) return;
          if (!runtime.textSubmit) {
            failClosed("text_submit_missing", { mode: runtime.mode || "" });
            return;
          }
          var message = asText(ui.inputText ? ui.inputText.value : "");
          if (!message) return;
          callRunStep(message, {});
        }

        function readInitialToolOutput() {
          var openai = openAiApi();
          var toolOutput = toRecord(openai.toolOutput);
          var toolResponseMetadata = toRecord(openai.toolResponseMetadata);
          if (Object.keys(toolResponseMetadata).length === 0) return toolOutput;
          return {
            toolOutput: toolOutput,
            toolResponseMetadata: toolResponseMetadata,
          };
        }

        window.addEventListener("openai:set_globals", function () {
          var payload = readInitialToolOutput();
          ingest(payload, "set_globals");
        });

        window.addEventListener("openai:notification", function (event) {
          var detail = toRecord(event && event.detail);
          var method = asText(detail.method);
          var params = toRecord(detail.params);
          if (method !== "ui/notifications/tool-result") {
            if (Object.keys(extractWidgetResult(params)).length > 0) {
              console.warn("[ui_notification_method_gate]", {
                reason: "notification_renderable_params_without_tool_result_method",
                method: method,
              });
              ingest(params, "notification_method_mismatch_params");
              return;
            }
            if (Object.keys(extractWidgetResult(detail)).length > 0) {
              console.warn("[ui_notification_method_gate]", {
                reason: "notification_renderable_detail_without_tool_result_method",
                method: method,
              });
              ingest(detail, "notification_method_mismatch_detail");
            }
            return;
          }
          var payload = params.toolOutput || params.payload || params.data || detail.toolOutput || detail.payload || detail.data || {};
          ingest(payload, "notification");
        });

        if (ui.inputForm) {
          ui.inputForm.addEventListener("submit", onSubmit);
        }

        var initialPayload = readInitialToolOutput();
        ingest(initialPayload, "initial");
      })();
    </script>
  </body>
</html>
