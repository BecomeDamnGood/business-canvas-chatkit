<!doctype html>
<html data-ui-version="__UI_VERSION__">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The Business Strategy Canvas Builder</title>
    <style>
      :root {
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: #e5e5ea;
        --bg: #f5f5f7;
        --card: #ffffff;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        --blue: #2b83e6;
        --stepOff: #e8e8ed;
      }

      * {
        box-sizing: border-box;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 15px;
        color: var(--text);
        line-height: 1.47;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--bg);
        background-image: url("/ui/assets/background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: scroll;
      }

      @media (min-width: 769px) {
        body {
          background-attachment: fixed;
        }
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }

      .wrap {
        max-width: 768px;
        margin: 0 auto;
        padding: 0 24px 15px;
        position: relative;
      }

      .page-header {
        width: 100%;
        background: transparent;
        color: var(--text);
        padding: 0;
        margin-bottom: 10px;
        position: relative;
      }

      .page-header .wrap {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        padding: 20px 24px 20px;
        max-width: 720px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.55);
        border-radius: 0 0 20px 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--line);
        border-top: none;
      }

      .title {
        grid-column: 1;
        grid-row: 1;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1.2;
        margin: 0;
        padding-right: 16px;
      }

      .byline {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: #424245;
      }

      .byline #byText {
        display: none;
      }

      .bylineLogo {
        width: 126px;
        height: auto;
        display: block;
        margin-top: 5px;
      }

      .meta {
        display: none;
      }

      .stepperRow {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
      }

      .page-header .stepperRow {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        padding: 0;
        margin: 0;
      }

      .stepper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        flex-wrap: nowrap;
      }

      .page-header .stepper {
        justify-content: space-between;
        width: 100%;
        gap: 4px;
        margin-top: 32px;
      }

      .step {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: auto;
        min-width: 1.6em;
        font-weight: 400;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: #6e6e73;
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
        flex: 1 1 0;
      }

      .step::before {
        content: "";
        display: block;
        width: 100%;
        max-width: 56px;
        height: 5px;
        margin-bottom: 6px;
        border-radius: 3px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }

      .step.active {
        font-weight: 600;
        color: #1d1d20;
      }

      .step.active::before,
      .step.completed::before {
        background: var(--blue);
        border-color: var(--blue);
      }

      .stepperTitle {
        font-size: 13px;
        font-weight: 400;
        color: var(--text);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        margin: 0 0 6px;
        white-space: nowrap;
        width: auto;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: max-content;
        pointer-events: none;
      }

      .stepperTitle.align-left {
        left: 0;
        transform: none;
        text-align: left;
      }

      .stepperTitle.align-right {
        left: auto;
        right: 0;
        transform: none;
        text-align: right;
      }

      .stepLine {
        display: none;
      }

      .card-stage {
        max-width: 720px;
        margin: 0 auto;
      }

      .shell {
        width: 100%;
        margin: 0;
        background: rgba(255, 255, 255, 0.55);
        border-radius: 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--line);
      }

      .bar,
      .status {
        display: none;
      }

      .body {
        padding: 28px 24px 26px;
      }

      .cardInner {
        display: flex;
        align-items: flex-start;
        gap: 20px;
      }

      .badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: auto;
        min-width: 50px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        background: transparent;
        border: none;
        border-radius: 0;
        font-weight: 600;
        font-size: 26px;
        line-height: 1;
        flex: 0 0 auto;
      }

      .badge::after {
        content: "";
        display: block;
        width: 50px;
        height: 5px;
        margin-top: 4px;
        border-radius: 3px;
        background: var(--blue);
      }

      .sectionTitle {
        font-size: 26px;
        font-weight: 600;
        margin: 0 0 8px;
        color: var(--text);
        line-height: 1;
      }

      .card {
        display: none;
      }

      .cardTitle {
        display: none;
      }

      .cardDesc {
        margin: 0;
        padding: 0;
        font-size: 17px;
        line-height: 1.5;
        color: #424245;
        max-width: 100%;
        white-space: pre-line;
      }

      .prestartWelcome {
        display: grid;
        gap: 12px;
      }

      .prestartHeadline {
        margin: 0;
      }

      .prestartBlock {
        margin: 0;
      }

      .prestartBlockTitle {
        margin: 0 0 4px;
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
      }

      .prestartBlockBody {
        margin: 0;
      }

      .prestartOutcomes {
        margin: 0;
        padding-left: 0;
        list-style-position: inside;
      }

      .prestartOutcomes li {
        margin: 0;
        padding-left: 0;
      }

      .prestartMetaGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 14px;
      }

      .prestartMetaItem {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.8);
        padding: 8px 10px;
      }

      .prestartMetaLabel {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      .prestartMetaValue {
        display: block;
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }

      .prompt {
        font-size: 22px;
        font-weight: 600;
        margin: 12px 0;
        letter-spacing: -0.015em;
        white-space: pre-wrap;
        color: var(--text);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 12px;
      }

      .row {
        display: flex;
        justify-content: flex-start;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      button,
      .btn {
        display: inline-flex;
        justify-content: flex-start;
        text-align: left;
        border: 1px solid rgba(43, 131, 230, 0.28);
        background: rgba(43, 131, 230, 0.06);
        color: var(--blue);
        border-radius: 999px;
        padding: 12px 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }

      .btn.primary {
        border-color: rgba(43, 131, 230, 0.28);
        background: rgba(43, 131, 230, 0.06);
        color: var(--blue);
      }

      button:disabled,
      .btn:disabled {
        background: #f5f5f7;
        border-color: var(--line);
        color: #86868b;
        cursor: not-allowed;
      }

      .inputWrap {
        margin-top: 12px;
      }

      .input {
        display: flex;
        align-items: flex-end;
        gap: 12px;
      }

      textarea,
      .inputWrap textarea {
        width: 100%;
        min-height: 96px;
        padding: 18px;
        font-size: 17px;
        color: #000000;
        border: 1px solid var(--line);
        border-radius: 18px;
        resize: vertical;
        outline: none;
        background-color: var(--card);
        background-image: url("/ui/assets/textbox_background.jpg");
        background-repeat: no-repeat;
        background-position: top right;
        background-size: auto;
      }

      textarea::placeholder {
        color: #86868b;
      }

      textarea:disabled {
        background-color: #f5f5f7;
        background-image: none;
        color: #86868b;
        cursor: not-allowed;
      }

      #inputSend {
        width: 48px;
        height: 48px;
        min-width: 48px;
        min-height: 48px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(180deg, #63acff, #2b83e6);
        color: transparent;
        font-size: 0;
        padding: 0;
        align-items: center;
        justify-content: center;
      }

      #inputSend::before {
        content: "";
        width: 24px;
        height: 24px;
        background: center / contain no-repeat url("/ui/assets/send_icon.svg");
      }

      #inputSend:disabled {
        background: var(--stepOff);
      }

      .error {
        margin-top: 12px;
        color: #8b1e1e;
        border: 1px solid rgba(139, 30, 30, 0.2);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff5f5;
      }

      .subtitle {
        text-align: center;
        color: var(--blue);
        font-size: 13px;
        font-weight: 600;
        margin: 13px 0 0;
        padding: 0;
        display: block;
      }

      .is-hidden {
        display: none !important;
      }

      @media (max-width: 768px) {
        .wrap {
          padding: 20px 16px 15px;
        }

        .page-header .wrap {
          grid-template-columns: 1fr;
          row-gap: 8px;
        }

        .title {
          padding-right: 0;
        }

        .byline {
          grid-column: 1;
          grid-row: 2;
          align-items: flex-start;
          margin-top: 2px;
        }

        .stepperRow {
          grid-row: 3;
        }

        .page-header .stepper {
          margin-top: 24px;
        }

        .cardInner {
          flex-direction: column;
          align-items: flex-start;
        }

        .input {
          flex-direction: column;
          align-items: stretch;
        }

        #inputSend {
          align-self: flex-end;
        }

        .prestartMetaGrid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

            role: asText(action.role).toLowerCase(),
            payloadMode: asText(action.payload_mode).toLowerCase(),
            label: label,
          };
        }

        function parseActions(result) {
          var state = toRecord(result.state);
          var strings = toRecord(state.ui_strings);
          var uiPayload = toRecord(result.ui);
          var actionContract = toRecord(uiPayload.action_contract);
          var sourceActions = Array.isArray(actionContract.actions)
            ? actionContract.actions
            : (Array.isArray(uiPayload.actions) ? uiPayload.actions : []);
          var out = [];
          for (var i = 0; i < sourceActions.length; i += 1) {
            var normalized = normalizeAction(sourceActions[i], strings);
            if (normalized) out.push(normalized);
          }
          if (out.length === 0 && Array.isArray(uiPayload.action_codes)) {
            for (var j = 0; j < uiPayload.action_codes.length; j += 1) {
              var actionCode = asText(uiPayload.action_codes[j]).toUpperCase();
              if (!actionCode) continue;
              var label = "";
              if (actionCode === "ACTION_START") {
                label = fallbackStringsFromLang(preferredLanguage()).btnStart;
              } else if (actionCode === "ACTION_STEP0_READY_START") {
                label = asText(
                  strings["menuLabel.STEP0_MENU_READY_START.ACTION_STEP0_READY_START"] ||
                    strings.btnOk_step0_ready ||
                    "Yes, I'm ready. Let's start!"
                );
              }
              out.push({
                actionCode: actionCode,
                role: actionCode === "ACTION_START" ? "start" : "choice",
                payloadMode: "none",
                label: label || actionCode,
              });
            }
          }
          return out;
        }

        function openAiApi() {
          return toRecord(globalThis.openai);
        }

          async function callRunStep(message, extraState) {
            var openai = openAiApi();
            if (typeof openai.callTool !== "function") {
              var actionCodeEcho = asText(message).trim().toUpperCase() || "TEXT_INPUT";
              var livenessState = Object.assign({}, runtime.state, toRecord(extraState), {
                ui_action_liveness_ack_status: "rejected",
                ui_action_liveness_state_advanced: "false",
                ui_action_liveness_reason_code: "transport_unavailable",
                ui_action_liveness_failure_class: "rejected",
                ui_action_liveness_action_code: actionCodeEcho,
                ui_action_liveness_client_action_id: "",
              });
              runtime.state = livenessState;
            if (typeof openai.setWidgetState === "function") {
                openai.setWidgetState(livenessState);
              }
              if (ui.error) {
                ui.error.textContent = fallbackStringsFromLang(preferredLanguage()).errorMessage;
                setHidden(ui.error, false);
              }
              setLoading(false);
              return;
            }
          var nextState = Object.assign({}, runtime.state, toRecord(extraState));
          var payload = {
            current_step_id: asText(nextState.current_step) || "step_0",
            user_message: asText(message),
            input_mode: "widget",
            state: nextState,
          };
          setLoading(true);
          try {
            var response = await openai.callTool("run_step", payload);
            ingest(response, "call_tool");
          } catch (error) {
            console.warn("[ui_call_failed]", { message: String(error && error.message ? error.message : error) });
            if (ui.error) {
              ui.error.textContent = fallbackStringsFromLang(preferredLanguage()).errorMessage;
              setHidden(ui.error, false);
            }
          } finally {
            setLoading(false);
          }
        }

        function step0ReadyLabel(state, action) {
          var label = asText(toRecord(action).label);
          if (label) return label;
          return asText(
            uiString(state, "menuLabel.STEP0_MENU_READY_START.ACTION_STEP0_READY_START") ||
            uiString(state, "btnOk_step0_ready") ||
            "Yes, I'm ready. Let's start!"
          );
        }

        function renderActions(mode, stepId, state) {
          if (ui.actions) ui.actions.innerHTML = "";
          var nonText = [];
          runtime.textSubmit = null;
          runtime.step0ReadyActionCode = "";
          for (var i = 0; i < runtime.actions.length; i += 1) {
            var action = runtime.actions[i];
            if (action.role === "text_submit") {
              runtime.textSubmit = action;
              continue;
            }
            nonText.push(action);
          }

          var step0ReadyAction = null;
          if (mode === "interactive" && stepId === "step_0") {
            for (var j = 0; j < nonText.length; j += 1) {
              if (nonText[j].actionCode === "ACTION_STEP0_READY_START") {
                step0ReadyAction = nonText[j];
                break;
              }
            }
          }

          var useStep0ReadyPath = Boolean(step0ReadyAction && nonText.length === 1);
          if (useStep0ReadyPath) {
            runtime.step0ReadyActionCode = asText(step0ReadyAction.actionCode);
            if (ui.btnOk) {
              ui.btnOk.textContent = step0ReadyLabel(state, step0ReadyAction);
              ui.btnOk.disabled = runtime.loading;
            }
          } else if (ui.actions) {
            for (var k = 0; k < nonText.length; k += 1) {
              (function (action) {
                var button = document.createElement("button");
                button.type = "button";
                button.textContent = action.label;
                button.disabled = runtime.loading;
                button.addEventListener("click", function () {
                  if (runtime.loading) return;
                  callRunStep(action.actionCode, {});
                });
                ui.actions.appendChild(button);
              })(nonText[k]);
            }
          }

          setHidden(ui.confirmActions, !useStep0ReadyPath);

          var showActionButtons = !useStep0ReadyPath && nonText.length > 0;
          setHidden(ui.actions, !showActionButtons);

          var showInput = mode === "interactive" && runtime.textSubmit && runtime.textSubmit.payloadMode !== "scores";
          if (runtime.textSubmit && runtime.textSubmit.payloadMode === "scores") showInput = false;

          setHidden(ui.inputForm, !showInput);
          if (ui.inputSend) {
            var submitLabel = runtime.textSubmit ? runtime.textSubmit.label : "";
            ui.inputSend.textContent = "";
            if (submitLabel) {
              ui.inputSend.setAttribute("title", submitLabel);
              ui.inputSend.setAttribute("aria-label", submitLabel);
            } else {
              ui.inputSend.removeAttribute("title");
              ui.inputSend.removeAttribute("aria-label");
            }
          }
        }

        function renderResult(result, source) {
          var state = toRecord(result.state);
          var resultStrings = toRecord(result.ui_strings);
          if (Object.keys(resultStrings).length > 0) {
            state = Object.assign({}, state, {
              ui_strings: Object.assign({}, resultStrings, toRecord(state.ui_strings)),
            });
          }
          var uiPayload = toRecord(result.ui);
          var view = toRecord(uiPayload.view);
          var modeRaw = asText(view.mode).toLowerCase();
          var mode =
            modeRaw === "waiting_locale" || modeRaw === "recovery" || modeRaw === "blocked" || modeRaw === "failed"
              ? "prestart"
              : modeRaw;
          if (!MODE_SET.has(mode)) mode = "prestart";
          var localUi = fallbackStringsFromLang(
            asText(state.language || state.ui_strings_lang || state.ui_strings_requested_lang || preferredLanguage())
          );

          runtime.state = state;
          runtime.mode = mode;
          runtime.actions = parseActions(result);

          var stepText = asText(state.current_step || result.current_step_id) || "step_0";
          var sectionTitleText =
            asText(
              uiString(state, "sectionTitle." + stepText) ||
              uiString(state, "title." + stepText) ||
              uiString(state, "stepLabel." + stepText) ||
              SECTION_TITLE_FALLBACK[stepText] ||
              stepText
            );
          if (ui.status) ui.status.textContent = stepText;
          if (ui.meta) ui.meta.textContent = mode;
          if (ui.sectionTitle) ui.sectionTitle.textContent = sectionTitleText;
          setHidden(ui.sectionTitle, sectionTitleText.length === 0);
          buildStepper(stepText, state, sectionTitleText);

          var badgeText = deriveStepBadge(stepText);
          if (ui.badge) ui.badge.textContent = badgeText;
          setHidden(ui.badge, badgeText.length === 0);

          var subtitle = uiString(state, "uiSubtitle") || uiString(state, "uiUseWidgetToContinue") || localUi.subtitle;
          if (ui.uiSubtitle) ui.uiSubtitle.textContent = subtitle;
          setHidden(ui.uiSubtitle, subtitle.length === 0);

          var titleText = uiString(state, "uiTitle") || localUi.uiTitle;
          if (titleText && ui.uiTitle) ui.uiTitle.textContent = titleText;
          var byText = uiString(state, "uiBylinePrefix") || uiString(state, "byText") || localUi.byline;
          if (byText && ui.byText) ui.byText.textContent = byText;

          var specialist = toRecord(result.specialist);
          var specialistBodyText = specialistBodyByPriority(specialist);
          var bodyText = specialistBodyText || asText(result.text);
          var promptText =
            asText(specialist.question) ||
            asText(result.prompt) ||
            asText(toRecord(uiPayload.prompt).body);
          if (mode === "interactive") {
            bodyText = dedupeBodyAgainstPrompt(bodyText, promptText);
          }
          var prestartMarkup = "";
          if (mode === "prestart") {
            prestartMarkup = buildPrestartBodyMarkup(state, localUi);
            var prestartBodyText = buildPrestartBodyText(state, localUi);
            bodyText = prestartMarkup ? prestartBodyText : (specialistBodyText || asText(result.text) || prestartBodyText);
            promptText = asText(uiString(state, "startHint") || localUi.startHint);
          }

          if (mode === "interactive") {
            var hasNonTextAction = false;
            for (var ai = 0; ai < runtime.actions.length; ai += 1) {
              if (runtime.actions[ai].role !== "text_submit") {
                hasNonTextAction = true;
                break;
              }
            }
            if (!hasNonTextAction) {
              var parsedChoices = extractChoicesFromPrompt(promptText);
              var promptChoices = Array.isArray(parsedChoices.choices) ? parsedChoices.choices : [];
              var uiActionCodes = Array.isArray(uiPayload.action_codes) ? uiPayload.action_codes : [];
              var synthesizedChoices = [];
              if (promptChoices.length > 0 && uiActionCodes.length === promptChoices.length) {
                for (var pc = 0; pc < promptChoices.length; pc += 1) {
                  var mappedCode = asText(uiActionCodes[pc]).toUpperCase();
                  if (!mappedCode) continue;
                  synthesizedChoices.push({
                    actionCode: mappedCode,
                    role: "choice",
                    payloadMode: "none",
                    label: asText(promptChoices[pc].label) || mappedCode,
                  });
                }
              } else if (stepText === "step_0" && promptChoices.length === 1) {
                synthesizedChoices.push({
                  actionCode: "ACTION_STEP0_READY_START",
                  role: "choice",
                  payloadMode: "none",
                  label: asText(promptChoices[0].label) || step0ReadyLabel(state, {}),
                });
              }
              if (synthesizedChoices.length > 0) {
                runtime.actions = runtime.actions.filter(function (action) {
                  return action.role === "text_submit";
                }).concat(synthesizedChoices);
                promptText = asText(parsedChoices.promptShown);
              }
            }
          }

          if (mode === "interactive" && bodyText.length === 0 && promptText.length === 0) {
            promptText = uiString(state, "step0.question.initial") || "Share your thoughts or choose an option.";
          }
          if (ui.cardDesc) ui.cardDesc.innerHTML = formatText(bodyText);
          if (mode === "prestart" && ui.cardDesc && prestartMarkup) {
            ui.cardDesc.innerHTML = prestartMarkup;
          }
          if (ui.card) ui.card.textContent = "";
          if (ui.prompt) ui.prompt.textContent = promptText;
          setHidden(ui.cardDesc, bodyText.length === 0 && prestartMarkup.length === 0);
          setHidden(ui.card, true);
          setHidden(ui.prompt, promptText.length === 0);

          var errorPayload = toRecord(result.error);
          var errorText = asText(errorPayload.user_message) || asText(errorPayload.message);

          if (mode === "prestart") {
            var hasStartAction = false;
            for (var i = 0; i < runtime.actions.length; i += 1) {
              if (runtime.actions[i].role === "start") {
                hasStartAction = true;
                break;
              }
            }
            if (!hasStartAction) {
              runtime.actions.unshift({
                actionCode: "ACTION_START",
                role: "start",
                payloadMode: "none",
                label: uiString(state, "btnStart") || localUi.btnStart,
              });
            }
          }

          setHidden(ui.error, true);

          renderActions(mode, stepText, state);

          runtime.hasRendered = true;
          setLoading(false);
        }

        function buildLocalPrestartResult() {
          var lang = asText(preferredLanguage() || "en").toLowerCase() || "en";
          return {
            current_step_id: "step_0",
            text: "",
            prompt: "",
            specialist: {
              action: "ASK",
              message: "",
              question: "",
              refined_formulation: "",
            },
            state: {
              current_step: "step_0",
              started: "false",
              language: lang,
              ui_strings_requested_lang: lang,
              ui_strings_lang: lang,
              ui_strings: {},
            },
            ui: {
              view: {
                mode: "prestart",
              },
            },
          };
        }

        function ingest(rawPayload, source) {
          var result = extractWidgetResult(rawPayload);
          if (Object.keys(result).length === 0) {
            console.warn("[ui_ingest_payload_missing_widget_result]", { source: source });
            if (!runtime.hasRendered) {
              renderResult(buildLocalPrestartResult(), source + "_local_prestart");
            }
            return;
          }
          renderResult(result, source);
        }

        function resolveNotificationEvent(detailRaw) {
          var detail = toRecord(detailRaw);
          var payload = detail.params || {};
          var hasResultInParams = Object.keys(extractWidgetResult(payload)).length > 0;
          if (hasResultInParams) {
            return {
              renderable: true,
              reason: "notification_params_payload",
              source: "openai_notification_method",
              payload: payload,
            };
          }
          if (Object.keys(extractWidgetResult(detail)).length > 0) {
            return {
              renderable: true,
              reason: "notification_detail_payload",
              source: "openai_notification_method",
              payload: detail,
            };
          }

          return {
            renderable: false,
            reason: "notification_payload_missing",
            source: "openai_notification_method",
            payload: {},
          };
        }

        function onSubmit(event) {
          event.preventDefault();
          if (runtime.loading) return;
          var message = asText(ui.inputText ? ui.inputText.value : "");
          if (!message) return;
          if (ui.inputText) ui.inputText.value = "";
          callRunStep(message, {});
        }

        function onConfirmReadyClick() {
          if (runtime.loading) return;
          var actionCode = asText(runtime.step0ReadyActionCode);
          if (!actionCode) return;
          callRunStep(actionCode, {});
        }

        function readInitialToolOutput() {
          var openai = openAiApi();
          var toolOutput = toRecord(openai.toolOutput);
          var toolResponseMetadata = toRecord(openai.toolResponseMetadata);
          if (Object.keys(toolResponseMetadata).length === 0) return toolOutput;
          return {
            toolOutput: toolOutput,
            toolResponseMetadata: toolResponseMetadata,
          };
        }

        function ingestSetGlobalsPayload() {
          var payload = readInitialToolOutput();
          ingest(payload, "set_globals");
        }

        window.addEventListener("openai:set_globals", function () {
          ingestSetGlobalsPayload();
        });

        window.addEventListener("openai:notification", function (event) {
          var detail = toRecord(event && event.detail);
          var resolved = resolveNotificationEvent(detail);
          if (!resolved.renderable) {
            return;
          }
          ingest(resolved.payload, resolved.source);
        });

        if (ui.inputForm) {
          ui.inputForm.addEventListener("submit", onSubmit);
        }
        if (ui.btnOk) {
          ui.btnOk.addEventListener("click", onConfirmReadyClick);
        }

          ingestSetGlobalsPayload();
        })();
      </script>
    </body>
  </html>
