      :root {

      :focus {
        outline: none;
      }
      :focus-visible {
        outline: 2px solid var(--orange);
        outline-offset: 2px;
      }
      
      /* Content wrapper – max-width 580px like .page in voorbeeld */
      .wrap {
        width: 100%;
        max-width: var(--layout-wrap-max-width);
        margin: 0 auto;
        padding: var(--layout-wrap-padding);
        position: relative;
      }
      
      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .wrap {
          max-width: none;
          padding: 0;
        }
      }
      /**
       * Redesign components – same selectors/IDs as step-card.template.html.
       * Light-only; 768px base; full-bleed header and thinking bar.
       */
      
      /* ─── Page header (full-bleed; same background as body, no dark strip) ─── */
      .page-header {
        width: 100%;
        max-width: 580px;
        background: transparent;
        color: var(--text);
        padding: 15px 0 0;
        margin-bottom: 20px;
        position: relative;
      }
      
      .page-header .wrap {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        padding: 0;
        max-width: var(--layout-wrap-max-width);
        margin: 0 auto;
        background: transparent;
      }
      
      .page-header .title,
      .page-header .subtitle,
      .page-header .byline {
        color: inherit;
      }
      
      /* Title – flows in grid row 1, 2 regels (max-width 260px), bold */
      .page-header .title {
        grid-column: 1;
        grid-row: 1;
        font-family: var(--font-serif);
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.15;
        margin: 0;
        padding-right: 16px;
        color: var(--text-dark);
        max-width: 360px;
        text-wrap: balance;
      }
      
      /* Subtitle placed after card in .wrap container (hint) */
      .subtitle {
        text-align: center;
        color: var(--text-light);
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.03em;
        margin: 22px 0 0;
        padding: 0;
        display: none;
      }
      
      /* Byline – flows in grid row 1 col 2 (right of title) */
      .page-header .byline {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: var(--space-1);
        margin: 0;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-light);
      }
      
      /* "A business model by" is in the SVG; hide the separate text in redesign */
      .byline #byText {
        display: none;
      }
      
      .page-header .byline img,
      .page-header .byline svg {
        width: 126px;
        height: auto;
        display: block;
        margin-top: 5px;
      }
      
      /* ─── Stepper row: step title above + 11 steps; in header, inside 55% rounded block, no connecting lines ─── */
      .stepperRow {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
      }
      
      /* Header stepper row – visual container is now .page-header .wrap */
      .page-header .stepperRow {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        padding: 0;
        margin: 0;
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      
      .page-header .stepper {
        justify-content: space-between;
        width: 100%;
        gap: 0;
        margin-top: 16px;
      }
      
      .stepper {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0;
        flex-wrap: nowrap;
        width: 100%;
      }
      
      /* Step item: label above bar (voorbeeld C.Lab) */
      .step-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: relative;
        cursor: pointer;
        padding-right: 6px;
      }
      .step-item:last-child { padding-right: 0; }
      
      .step-item-label {
        font-size: 9px;
        letter-spacing: 0.03em;
        color: var(--text-light);
        font-weight: 400;
        margin-bottom: 5px;
        min-height: 9px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        line-height: 1;
      }
      .step-item-label:empty {
        visibility: hidden;
        margin-bottom: 5px;
      }
      .step-item.active .step-item-label {
        color: var(--orange);
        font-weight: 500;
        position: static;
        z-index: 2;
        pointer-events: none;
        text-align: left;
        max-width: none;
        overflow: visible;
        text-overflow: clip;
      }
      .step-item--presentation.active .step-item-label {
        align-self: flex-end;
        text-align: right;
      }
      
      .step-bar {
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(0,0,0,0.12);
        transition: background 0.2s;
        position: relative;
        overflow: hidden;
      }
      .step-item.active .step-bar { background: var(--orange); }
      .step-item:hover .step-bar { background: var(--orange-light); }
      .step-item.completed .step-bar { background: rgba(232, 116, 42, 0.38); }

      /* Stepper thinking animation: one left-to-right sweep across all segments */
      .stepper.loading-stepper .step-item .step-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        transform: translateX(-140%);
        opacity: 0;
        animation: stepperKnightSweep 1100ms linear infinite;
      }
      .stepper.loading-stepper .step-item.active .step-bar::after,
      .stepper.loading-stepper .step-item.completed .step-bar::after {
        background: linear-gradient(
          90deg,
          rgba(232, 116, 42, 0) 0%,
          rgba(255, 206, 176, 0.95) 50%,
          rgba(232, 116, 42, 0) 100%
        );
      }
      .stepper.loading-stepper .step-item:not(.active):not(.completed) .step-bar::after {
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(255, 255, 255, 0.76) 50%,
          rgba(0, 0, 0, 0) 100%
        );
      }
      .stepper.loading-stepper .step-item:nth-child(1) .step-bar::after { animation-delay: 0ms; }
      .stepper.loading-stepper .step-item:nth-child(2) .step-bar::after { animation-delay: 100ms; }
      .stepper.loading-stepper .step-item:nth-child(3) .step-bar::after { animation-delay: 200ms; }
      .stepper.loading-stepper .step-item:nth-child(4) .step-bar::after { animation-delay: 300ms; }
      .stepper.loading-stepper .step-item:nth-child(5) .step-bar::after { animation-delay: 400ms; }
      .stepper.loading-stepper .step-item:nth-child(6) .step-bar::after { animation-delay: 500ms; }
      .stepper.loading-stepper .step-item:nth-child(7) .step-bar::after { animation-delay: 600ms; }
      .stepper.loading-stepper .step-item:nth-child(8) .step-bar::after { animation-delay: 700ms; }
      .stepper.loading-stepper .step-item:nth-child(9) .step-bar::after { animation-delay: 800ms; }
      .stepper.loading-stepper .step-item:nth-child(10) .step-bar::after { animation-delay: 900ms; }
      .stepper.loading-stepper .step-item:nth-child(11) .step-bar::after { animation-delay: 1000ms; }

      @keyframes stepperKnightSweep {
        0% { transform: translateX(-140%); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 0.55; }
        100% { transform: translateX(140%); opacity: 0; }
      }
      
      /* ─── Section title (inside card, next to badge) ─── */
      /* Visible when a main step starts. Hidden during substeps so cardDesc moves up. */
      .sectionTitle {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0 0 12px;
        color: var(--text-light);
        line-height: 1.3;
      }
      
      /* Collapse when empty (substep) – content below shifts up naturally */
      .sectionTitle:empty {
        display: none;
      }
      
      /* Programmatic hide via hidden attribute */
      .sectionTitle[hidden] {
        display: none !important;
        margin: 0;
      }
      
      /* ─── Card – exact match voorbeeld ─── */
      .card {
        max-width: 100%;
        margin: 0 auto;
        padding: 28px 40px 43px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 8px 40px rgba(60,40,20,.08), 0 2px 8px rgba(60,40,20,.04);
        position: relative;
        overflow: hidden;
      }
      
      .card::before {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, #e8742a33 0%, transparent 70%);
        bottom: -60px;
        right: -40px;
        pointer-events: none;
      }
      
      /* Voorbeeld: badge + step-label verticaal, geen side-by-side */
      .cardInner {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        position: relative;
        z-index: 1;
      }
      
      /* Badge = step-number in voorbeeld: 01 boven step-label, 44px, margin-bottom 2px, opacity .9 */
      .badge {
        display: block;
        width: 100%;
        font-variant-numeric: tabular-nums;
        font-family: 'DM Serif Display', serif;
        font-size: 44px;
        font-weight: 700;
        color: var(--orange);
        line-height: 1;
        margin-bottom: 2px;
        opacity: 0.9;
        background: transparent;
        border: none;
        border-radius: 0;
        position: relative;
      }
      
      .badge::after {
        display: none; /* Voorbeeld: geen streepje onder 01 */
      }
      
      @media (prefers-reduced-motion: reduce) {
        .stepper.loading-stepper .step-item .step-bar::after {
          animation: none;
          opacity: 0;
          transform: translateX(0);
        }
      }
      
      .cardTitle {
        display: none;
      }
      
      .presentationPreview {
        display: none;
        margin-top: var(--space-4);
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }
      
      .presentationPreview.visible {
        display: block;
      }
      
      .presentationThumbLink {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }
      
      .presentationThumb {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: var(--radius-md);
        object-fit: contain;
      }
      
      .presentationActions {
        margin-top: var(--space-4);
      }
      
      .presentationDownload {
        display: inline-block;
        border: 1.5px solid var(--orange-border);
        background: rgba(255, 255, 255, 0.55);
        color: var(--orange);
        border-radius: var(--r-full);
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
        font-family: var(--font-sans);
        text-decoration: none;
        transition: background var(--t-fast), border-color var(--t-fast), box-shadow var(--t-fast);
      }
      
      .presentationDownload:hover {
        background: rgba(232, 116, 42, 0.09);
        border-color: var(--orange);
        box-shadow: var(--shadow-glow);
      }
      
      .cardDesc {
        margin: 0;
        padding: 0;
        font-size: 14px;
        font-weight: 300;
        line-height: 1.65;
        color: var(--text-mid);
        max-width: 100%;
        white-space: normal;
        text-align: left;
      }
      /* Grid alleen voor step-content met 2 kolommen; prestart gebruikt block (margin collapse) */
      .cardDesc.has-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 var(--space-6);
      }
      
      .cardDesc > * {
        grid-column: 1 / -1;
      }
      
      .cardDesc > .cardSubheading:nth-of-type(3),
      .cardDesc > .cardSubheading:nth-of-type(3) + p {
        grid-column: 1;
      }
      
      .cardDesc > .cardSubheading:nth-of-type(4),
      .cardDesc > .cardSubheading:nth-of-type(4) + p {
        grid-column: 2;
      }

      .inlineNotice {
        margin-top: var(--space-3);
        padding: 10px 14px;
        font-size: 13px;
        line-height: 1.5;
        color: #7a4800;
        background: rgba(232, 116, 42, 0.10);
        border: 1px solid var(--orange-border);
        border-radius: var(--r-md);
        display: none;
      }

      .skeleton-stack {
        display: grid;
        gap: 12px;
      }

      .skeleton-line {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.08);
        overflow: hidden;
        position: relative;
      }

      .skeleton-line::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.55),
          transparent
        );
        animation: skeletonShimmer 1.2s var(--ease) infinite;
      }

      .bootstrap-wait-shell {
        align-content: start;
      }

      @keyframes skeletonShimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-line::after {
          animation: none;
        }
      }
      
      .cardDesc p,
      .cardDesc .section-body {
        margin: 0 0 12px;
        font-size: 14.5px;
        color: var(--text-mid);
        line-height: 1.65;
        font-weight: 300;
      }

      .cardDesc .inlineLink {
        color: var(--orange);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      /* Ben profile: circular avatar top-left, text beside it (OpenAI widget pattern) */
      .cardDesc.is-ben-profile {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: var(--space-4);
        align-items: start;
      }
      .cardDesc-benAvatar {
        grid-column: 1;
        grid-row: 1 / -1;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }
      .cardDesc.is-ben-profile > .cardDesc-benAvatar {
        align-self: start;
      }
      .cardDesc.is-ben-profile > p,
      .cardDesc.is-ben-profile > .cardDesc-para,
      .cardDesc.is-ben-profile > .section {
        grid-column: 2;
      }
      .cardDesc.is-ben-profile > ul,
      .cardDesc.is-ben-profile > ol {
        grid-column: 2;
      }

      .cardDesc.is-ben-profile p,
      .cardDesc.is-ben-profile .cardDesc-para {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 300;
        line-height: 1.6;
        color: var(--text-mid);
        max-width: none;
      }

      .cardDesc.is-ben-profile:not(.has-grid) > p:first-of-type,
      .cardDesc.is-ben-profile .card-headline {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 300;
        line-height: 1.6;
        color: var(--text-mid);
        max-width: none;
        margin-bottom: 10px;
      }
      
      .cardDesc:not(.has-grid) > p:first-of-type,
      .cardDesc .card-headline {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 600;
        color: var(--text-dark);
        line-height: 1.35;
        margin-bottom: 14px;
        max-width: 380px;
      }

      .cardDesc p:last-child {
        margin-bottom: 0;
      }

      /* Step-0 ASK screen: context line + main question layout (without changing button logic) */
      .cardDesc.is-step0-ask-layout {
        display: block;
      }

      .cardDesc.is-step0-ask-layout > p:first-of-type {
        font-family: var(--font-sans);
        font-size: 13.5px;
        font-weight: 400;
        font-style: italic;
        letter-spacing: 0.01em;
        line-height: 1.5;
        color: var(--text-light);
        margin: 0 0 5px;
      }

      .cardDesc.is-step0-ask-layout > p:nth-of-type(2) {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 600;
        line-height: 1.35;
        color: var(--text-dark);
        margin: 0 0 14px;
        max-width: 840px;
      }

      .cardDesc.is-step0-ask-layout > p + p {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 600;
        line-height: 1.35;
        color: var(--text-dark);
        margin: 0 0 14px;
        max-width: 840px;
      }

      .cardDesc .cardSubheading,
      .cardDesc strong,
      .cardDesc .section-title {
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--orange);
      }
      
      .cardDesc .section-title {
        font-weight: 700;
      }
      
      .cardDesc .cardSubheading,
      .cardDesc .section-title {
        margin: 0 0 8px;
      }
      
      .cardDesc strong {
        display: block;
        margin: 14px 0 8px;
      }
      
      .cardDesc strong:first-child {
        margin-top: 0;
      }
      
      .cardDesc .cardSubheading:first-child {
        margin-top: 0;
      }

      .cardDesc .structuredList {
        margin: 0 0 var(--space-4);
        padding-left: var(--space-7);
      }

      .cardDesc ul,
      .cardDesc ol {
        margin: 0 0 var(--space-4);
        padding-left: var(--space-7);
      }

      .cardDesc .structuredListBullet {
        list-style: none;
        padding-left: 0;
      }
      
      .cardDesc .structuredListBullet li {
        position: relative;
        padding-left: 18px;
      }
      
      .cardDesc .structuredListBullet li::before,
      .cardDesc ul li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.55em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--orange);
      }
      
      .cardDesc ul li {
        position: relative;
        padding-left: 18px;
        list-style: none;
      }

      .cardDesc .structuredListOrdered {
        list-style: decimal;
      }

      .cardDesc .structuredList li {
        margin: 0 0 var(--space-2);
      }

      .cardDesc ul li,
      .cardDesc ol li {
        margin: 0 0 var(--space-2);
      }

      .cardDesc .structuredList li:last-child {
        margin-bottom: 0;
      }
      
      /* Section (prestart) – exact match voorbeeld */
      .cardDesc .section {
        margin-bottom: 14px;
      }
      .cardDesc .section:last-of-type {
        margin-bottom: 0;
      }
      
      /* Divider – exact match voorbeeld */
      .cardDesc .divider {
        height: 1px;
        background: rgba(0,0,0,0.07);
        margin: 14px 0;
        border: none;
        padding: 0;
      }
      
      /* Inline video player for step intros and welcome content */
      .cardDesc .cardDesc-video {
        position: relative;
        width: 100%;
        max-width: 498px;
        margin: 14px 0;
        border-radius: var(--r-md);
        overflow: hidden;
        aspect-ratio: 16/9;
        background: #000;
      }
      .cardDesc .cardDesc-video video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      
      /* Meta row – links uitgelijnd */
      .cardDesc .meta-row {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        margin: 0;
        justify-content: flex-start;
        text-align: left;
      }
      .cardDesc .meta-item .meta-label {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-light);
        font-weight: 400;
        margin-bottom: 3px;
      }
      .cardDesc .meta-item .meta-value {
        font-size: 14.5px;
        color: var(--text-dark);
        font-weight: 600;
      }
      
      /* Deliverables (By the end you'll have) */
      .cardDesc .deliverables {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 2px;
      }
      .cardDesc .deliverable {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 14.5px;
        color: var(--text-mid);
        font-weight: 300;
      }
      .cardDesc .deliverable-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--orange);
        flex-shrink: 0;
      }
      
      /* ─── Image placeholder (OPTIONAL) ─── */
      /* Design-time placeholder between cardDesc paragraphs.
         Safe to omit entirely – content flows normally without it.
         When present, shows a dashed outline where a future image will go. */
      .cardDesc-image-placeholder {
        min-height: 90px;
        margin: var(--space-4) 0 var(--space-6);
        border: 2px dashed var(--color-placeholder-image-border);
        border-radius: var(--radius-md);
        background: none;
      }
      
      /* Hide placeholder programmatically without removing from DOM */
      .cardDesc-image-placeholder[hidden] {
        display: none !important;
        margin: 0;
      }
      
      /* Actual image in cardDesc after first paragraph (see IMAGE-INSERTION-IMPLEMENTATION.md) */
      .cardDesc-image {
        display: block;
        width: 100%;
        height: auto;
        margin: var(--space-4) 0;
        border-radius: var(--radius-md);
        object-fit: cover;
      }
      
      /* Paragraph styling when cardDesc uses innerHTML with images */
      .cardDesc-para {
        margin: 0 0 var(--space-4);
        font-size: var(--font-size-lg);
        line-height: var(--line-height-relaxed);
        color: var(--color-text-secondary);
        white-space: pre-wrap;
      }
      
      .cardDesc-para:last-child {
        margin-bottom: 0;
      }
      
      /* ─── Statements panel ─── */
      .statementsPanel {
        margin-top: var(--space-5);
        margin-bottom: var(--space-5);
      }
      
      .statementsTitle {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--orange);
        margin-bottom: var(--space-2);
      }
      
      .statementsCount {
        font-size: 11px;
        font-weight: 300;
        font-style: italic;
        color: var(--text-light);
        margin-bottom: var(--space-3);
      }
      
      .statementsList {
        font-size: 13.5px;
        font-weight: 300;
        line-height: 1.55;
        color: var(--text-mid);
        white-space: normal;
      }

      .statementsListOrdered {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .statementsListItem {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin: 0 0 4px;
      }

      .statementsListItem:last-child {
        margin-bottom: 0;
      }

      .statementsListNum {
        color: var(--orange);
        font-weight: 700;
        min-width: 18px;
      }

      .statementsListText {
        flex: 1 1 auto;
      }
      
      /* ─── Scoring panel ─── */
      .scoringPanel {
        display: none;
        margin-top: var(--space-5);
        margin-bottom: var(--space-5);
        max-width: 100%;
      }
      
      .scoringPanel.visible {
        display: block;
      }
      
      .scoringIntro {
        font-size: 14.5px;
        line-height: 1.6;
        color: var(--text-mid);
        font-weight: 300;
        margin-bottom: 8px;
        white-space: pre-wrap;
      }
      
      .scoringCluster {
        margin-bottom: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.10);
      }
      
      .scoringClusterHeader {
        font-family: var(--font-sans);
        font-weight: 700;
        font-size: 12px;
        color: var(--orange);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: var(--space-4);
        flex-wrap: wrap;
      }
      
      .scoringClusterHeader .themeName {
        flex: 1 1 auto;
      }
      
      .scoringClusterHeader .avgScore,
      .scoringClusterHeader .filledCount {
        display: inline-flex;
        align-items: center;
        background: rgba(232, 116, 42, 0.10);
        border: 1px solid rgba(232, 116, 42, 0.22);
        border-radius: var(--r-full);
        padding: 3px 10px;
        font-size: 10px;
        color: var(--orange);
        font-weight: 500;
        letter-spacing: 0.04em;
      }
      
      .scoringClusterRows {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }
      
      .scoringRow {
        display: flex;
        align-items: center;
        gap: var(--space-4);
      }
      
      .scoringRow .statementText {
        flex: 1 1 auto;
        font-size: var(--font-size-base);
        line-height: 1.4;
        color: var(--text);
      }
      
      .scoringRow input.scoreInput {
        width: 48px;
        min-width: 48px;
        height: 38px;
        padding: 0;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
        border: 1.5px solid rgba(0, 0, 0, 0.10);
        border-radius: var(--r-sm);
        background: rgba(255, 255, 255, 0.80);
        color: var(--text-dark);
        outline: none;
        transition: border-color var(--t-fast), box-shadow var(--t-fast);
      }
      
      .scoringRow input.scoreInput:focus {
        border-color: var(--orange-light);
        box-shadow: var(--shadow-glow);
      }
      
      .scoringContinueWrap {
        margin-top: var(--space-10);
      }
      
      .scoringContinueWrap .btn {
        min-width: 140px;
      }
      
      .scoringContinueWrap .btn:disabled {
        opacity: 1;
        cursor: not-allowed;
      }
      
      /* ─── Prompt ─── */
      .prompt {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 600;
        margin: var(--space-4) 0 var(--space-4);
        letter-spacing: -0.01em;
        line-height: 1.4;
        white-space: pre-wrap;
        color: var(--text-dark);
      }

      .prompt.with-divider {
        border-top: 1px solid rgba(0, 0, 0, 0.10);
        padding-top: 18px;
        margin-top: 14px;
      }

      .prompt.choice-pending {
        color: var(--text-light);
      }
      
      /* ─── Input + Send (textbox background: top-right, no scale) ─── */
      .inputWrap {
        display: flex;
        align-items: flex-end;
        gap: var(--space-4);
        margin-top: var(--space-4);
        margin-bottom: var(--space-5);
        width: 100%;
        position: relative;
      }
      
      .inputWrap textarea {
        width: 100%;
        min-height: var(--component-input-min-height);
        padding: 13px 64px 13px 16px;
        font-size: 14px;
        font-weight: 300;
        color: var(--text-dark);
        line-height: 1.6;
        border: 1px solid rgba(0, 0, 0, 0.10);
        border-radius: 14px;

        background-position: top right;

      .inputWrap.is-step0-ask-layout textarea {
        min-height: var(--component-input-min-height);
      }
      
      .inputWrap textarea::placeholder {
        color: var(--text-placeholder);
      }
      
      .inputWrap textarea:focus {
        border-color: var(--orange-light);
        box-shadow: var(--shadow-glow);
      }
      
      .inputWrap textarea:disabled {
        background-color: var(--cream-dark);
        background-image: none;
        color: var(--text-placeholder);
        cursor: not-allowed;
      }
      
      /* Send button – dark fill, orange on hover */
      .send {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: var(--component-send-size);
        height: var(--component-send-size);
        min-width: var(--component-send-size);
        min-height: var(--component-send-size);
        border: none;
        border-radius: 50%;
        background: var(--text-dark);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--t-fast), transform var(--t-fast) var(--spring);
      }
      
      .send:hover:not(:disabled) {
        background: var(--orange);
        transform: scale(1.09);
      }
      
      .send img,
      .send svg {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      
      .send:disabled {
        background: var(--cream-dark);
        color: var(--text-placeholder);
        cursor: not-allowed;
      }
      
      /* ─── Choice buttons (cream bg, orange border/text, pill shape) ─── */
      .choiceWrap {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
        margin-top: var(--space-4);
        margin-bottom: var(--space-5);
        width: 100%;
        align-self: stretch;
      }
      
      .choiceBtn {
        width: 100%;
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
        border: 1.5px solid var(--orange-border);
        border-radius: var(--r-full);
        background: rgba(255, 255, 255, 0.55);
        color: var(--orange);
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--spring), border-color var(--t-fast), box-shadow var(--t-fast);
      }
      
      .choiceBtn:hover:not(:disabled) {
        background: rgba(232, 116, 42, 0.09);
        border-color: var(--orange);
        box-shadow: var(--shadow-glow);
        transform: translateY(-1px);
      }
      
      .choiceBtn:disabled {
        background: var(--cream-dark);
        border-color: var(--divider);
        color: var(--text-placeholder);
        cursor: not-allowed;
      }
      
      .choiceError {
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }

      .wordingChoiceWrap {
        display: none;
        flex-direction: column;
        gap: var(--space-3);
        margin-top: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .wordingChoiceHeading {
        font-size: 9px;
        font-weight: 400;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 8px;
      }

      .wordingChoiceCard {
        border: 1px solid var(--divider);
        border-radius: var(--r-lg);
        background: rgba(255, 255, 255, 0.60);
        padding: 14px 16px;
      }

      .wordingChoiceList {
        margin: 0;
        padding-left: 0;
        max-height: 180px;
        overflow-y: auto;
        list-style: none;
      }

      .wordingChoiceList li {
        margin: 0 0 var(--space-2) 0;
        position: relative;
        padding-left: 16px;
      }

      .wordingChoiceList li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.55em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--orange);
      }

      .wordingChoiceText {
        white-space: pre-wrap;
        margin: 0 0 10px 0;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--text-light);
      }

      .wordingChoiceSelectBtn {
        width: 100%;
        margin-top: 8px;
        background: rgba(232, 116, 42, 0.08);
        border: 1.5px solid rgba(232, 116, 42, 0.18);
        border-radius: 10px;
        padding: 9px 13px;
        font-size: 13.5px;
        color: var(--orange);
        text-align: left;
        justify-content: flex-start;
      }
      
      .wordingChoiceSelectBtn:hover:not(:disabled) {
        background: rgba(232, 116, 42, 0.12);
        border-color: var(--orange-border);
      }

      .wordingChoiceInstruction {
        font-size: var(--font-size-sm);
        font-weight: 400;
        color: var(--text-mid);
        white-space: pre-line;
      }

      .wordingChoiceRetained {
        border: 1px solid var(--divider);
        border-radius: var(--r-lg);
        background: rgba(255, 255, 255, 0.45);
        padding: 14px 16px;
      }

      .wordingChoiceRetainedHeading {
        margin: 0 0 10px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-mid);
      }

      .wordingChoiceRetainedList {
        margin: 0;
        padding-left: 0;
        list-style: none;
      }

      .wordingChoiceRetainedList li {
        margin: 0 0 var(--space-2) 0;
        position: relative;
        padding-left: 16px;
        color: var(--text-dark);
      }

      .wordingChoiceRetainedList li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.55em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--orange);
      }
      
      /* ─── Thinking (in-card text, for widget) ─── */
      .thinking {
        margin: 0;
        color: var(--muted);
        font-weight: var(--font-weight-medium);
      }
      
      /* ─── Thinking bar (hidden – animation lives on .badge.loading instead) ─── */
      /* HTML kept for widget compatibility; visually replaced by badge animation. */
      .thinking-bar {
        display: none;
      }
      
      body.has-thinking-bar {
        padding-bottom: 0;
      }
      
      /* ─── Controls row ─── */
      .row {
        display: flex;
        justify-content: flex-start;
        gap: var(--space-4);
        margin-top: 0; /* CTA heeft eigen margin-top 18px; voorbeeld: 18px totaal */
        flex-wrap: wrap;
        align-items: flex-start;
      }
      
      .btn {
        display: inline-flex;
        justify-content: flex-start;
        text-align: left;
        border: 1.5px solid rgba(0, 0, 0, 0.12);
        background: transparent;
        color: var(--text-mid);
        border-radius: var(--r-full);
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--spring), border-color var(--t-fast), box-shadow var(--t-fast);
      }
      
      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      
      .btn.primary {
        border-color: var(--text-dark);
        background: var(--text-dark);
        color: #fff;
      }
      
      .btn.primary:hover:not(:disabled) {
        background: var(--orange);
        border-color: var(--orange);
        box-shadow: 0 4px 18px rgba(232, 116, 42, 0.30);
      }
      
      .btn:disabled {
        background: var(--cream-dark);
        border-color: var(--divider);
        color: var(--text-placeholder);
        cursor: not-allowed;
      }
      
      #btnStart {
        border-radius: 100px;
        width: fit-content;
        max-width: 100%;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 28px 16px 24px;
        margin-top: 10px;
        transition: background 0.2s, transform 0.15s;
      }
      #btnStart:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      #btnStart .cta-arrow {
        width: 28px;
        height: 28px;
        background: var(--orange);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.2s;
      }
      #btnStart:hover:not(:disabled) .cta-arrow {
        background: rgba(255,255,255,0.25);
      }
      #btnStart .cta-arrow svg {
        width: 13px;
        height: 13px;
      }
      
      .startHint {
        color: var(--muted);
        font-weight: var(--font-weight-medium);
        margin-left: var(--space-1);
      }
      
      /* ─── Status (hidden) ─── */
      .status {
        display: none;
      }
      
      /* ─── Debug overlay ─── */
      #debugOverlay {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 220px;
        overflow: auto;
        background: rgba(28, 28, 31, 0.94);
        color: #e8e8ed;
        font-family: ui-monospace, monospace;
        font-size: var(--font-size-xs);
        line-height: 1.35;
        padding: var(--space-4);
        border-top: 1px solid var(--line);
        white-space: pre-wrap;
        word-break: break-word;
        z-index: 100;
      }
      
      #debugOverlay.visible {
        display: block;
      }
      
      /* ─── Tablet: scale down byline logo (logo blijft) ─── */
      @media (max-width: 600px) {
        .page-header .byline img,
        .page-header .byline svg {
          width: 100px;
        }
      }
      
      /* ─── Mobile: reflow ─── */
      @media (max-width: 480px) {
        body {
          padding-bottom: 60px;
        }
        .page-header .wrap {
          grid-template-columns: 1fr;
          padding: 0 16px;
        }
      
        .page-header .title {
          padding-right: 0;
          font-size: 22px;
          max-width: 100%;
        }
      
        .page-header .byline {
          grid-column: 1;
          grid-row: 2;
          align-items: flex-start;
          margin-top: var(--space-2);
        }
      
        .page-header .stepperRow {
          grid-row: 3;
        }
      
        .page-header .stepper {
          margin-top: 28px;
        }
      
        .page-header .byline img,
        .page-header .byline svg {
          width: 100px;
        }
      
        .stepper {
          gap: 0;
        }
      
        .inputWrap textarea {
          padding-right: 58px;
        }
      }
      
    </style>
  </head>

      if (!target) return;
      const parts = [message];
      if (file) parts.push(`@ ${file}${line ? ":" + line : ""}${col ? ":" + col : ""}`);
      const prefix = uiStringFromContract("dev.error.prefix");
      target.textContent = `${prefix} ${parts.join(" ")}`.trim();
    };
    window.addEventListener("error", (e) => {
      console.error(
        "[ui_error]",
        e?.message,
        e?.filename,
        e?.lineno,
        e?.colno,
        e?.error?.stack
      );
      reportDevError(
        String(e?.message || uiStringFromContract("dev.error.unknown")),
        e?.filename,
        e?.lineno,
        e?.colno
      );
    });
    window.addEventListener("unhandledrejection", (e) => {
      const reason = e?.reason;
      console.error(
        "[ui_rejection]",
        reason && reason.message ? reason.message : reason,
        reason && reason.stack ? reason.stack : ""
      );
      reportDevError(
        String(reason && reason.message ? reason.message : reason || uiStringFromContract("dev.error.unhandled_rejection"))
      );
    });
  }
  if (typeof window !== "undefined") {
    resolveAllowedHostOrigin();
    window.addEventListener("message", (e) => {
      if (!isTrustedBridgeMessageEvent(e)) return;
      const data = e?.data;
      if (!data || typeof data !== "object") return;
      if (data.jsonrpc !== "2.0") return;
      const method = typeof data.method === "string" ? data.method : "";
      if (method.startsWith("ui/")) {
        setBridgeEnabled(true);
        notifyHostTransportSignal("bridge_message");
      }
      if (method === "ui/notifications/tool-result") {
        try {
          ingestHostPayload(data.params, "host_notification");
          notifyHostTransportSignal("host_notification");
        } catch (err) {
          console.error(err);
        } finally {
          if (getIsLoading()) setLoading(false);
        }
        return;
      }
      if (data.id) {
        handleBridgeResponse(data);
        return;
      }
    });
  }
  function syncSendButtonState(input) {
    if (!input || getIsLoading()) return;
    const inputVal = (input.value || "").trim();
    setSendEnabled(inputVal.length > 0);
  }
  function submitWidgetInput() {
    if (getIsLoading()) return;
    const input = document.getElementById("input");
    const inputVal = (input?.value || "").trim();
    if (!inputVal) return;
    const submitActionCode = actionCodeFromState("ui_action_text_submit");
    const submitPayloadMode = actionPayloadModeFromState("ui_action_text_submit") || "text";
    if (!submitActionCode) {
      console.warn("[ui_action_missing]", { state_key: "ui_action_text_submit" });
      setInlineNotice(
        uiStringFromContract("error.contract.body")
      );
      return;
    }
    const win = globalThis;
    const shouldSubmitScores = submitPayloadMode === "scores";
    if (shouldSubmitScores) {
      const scoringScores = win.__dreamScoringScores || [];
      const payloadScores = [];
      for (let ci = 0; ci < scoringScores.length; ci++) {
        const row = scoringScores[ci] || [];
        const normRow = [];
        for (let si = 0; si < row.length; si++) {
          const v = Number(row[si]);
          normRow.push(isNaN(v) ? 0 : Math.max(1, Math.min(10, v)));
        }
        payloadScores.push(normRow);
      }
      if (input) input.value = "";
      setSendEnabled(false);
      win.__dreamScoringScores = [];
      callRunStep(submitActionCode, { __pending_scores: payloadScores });
      return;
    }
    if (input) input.value = "";
    setSendEnabled(false);
    callRunStep(submitActionCode, { __text_submit: inputVal });
  }
  var inputEl = document.getElementById("input");
  if (inputEl) {
    const sync = () => syncSendButtonState(inputEl);
    inputEl.addEventListener("input", sync);
    inputEl.addEventListener("change", sync);
    inputEl.addEventListener("keydown", (event) => {
      const ev = event;
      if (ev.key === "Enter" && !ev.shiftKey && !ev.altKey && !ev.ctrlKey && !ev.metaKey) {
        ev.preventDefault();
        submitWidgetInput();
      }
    });
    sync();
  }
  var sendEl = document.getElementById("send");
  if (sendEl) {
    sendEl.addEventListener("click", () => {
      submitWidgetInput();
    });
  }
  var wordingChoicePickUser = document.getElementById("wordingChoicePickUser");
  if (wordingChoicePickUser) {
    wordingChoicePickUser.addEventListener("click", () => {
      if (getIsLoading()) return;
      const actionCode = actionCodeFromState("ui_action_wording_pick_user");
      if (!actionCode) {
        console.warn("[ui_action_missing]", { state_key: "ui_action_wording_pick_user" });
        setInlineNotice(
          uiStringFromContract("error.contract.body")
        );
        return;
      }
      callRunStep(actionCode);
    });
  }
  var wordingChoicePickSuggestion = document.getElementById("wordingChoicePickSuggestion");
  if (wordingChoicePickSuggestion) {
    wordingChoicePickSuggestion.addEventListener("click", () => {
      if (getIsLoading()) return;
      const actionCode = actionCodeFromState("ui_action_wording_pick_suggestion");
      if (!actionCode) {
        console.warn("[ui_action_missing]", { state_key: "ui_action_wording_pick_suggestion" });
        setInlineNotice(
          uiStringFromContract("error.contract.body")
        );
        return;
      }
      callRunStep(actionCode);
    });
  }
  var btnStart = document.getElementById("btnStart");
  if (btnStart) {
    btnStart.addEventListener("click", () => {
      if (getIsLoading()) return;
      const actionCode = actionCodeFromState("ui_action_start");
      if (!actionCode) {
        console.warn("[ui_action_missing]", { state_key: "ui_action_start" });
        setInlineNotice(
          uiStringFromContract("error.contract.body")
        );
        btnStart.disabled = true;
        return;
      }
      setSessionStarted(true);
      setSessionWelcomeShown(false);
      callRunStep(actionCode, { started: "true" });
    });
  }
  var btnStartDreamExercise = document.getElementById("btnStartDreamExercise");
  if (btnStartDreamExercise) {
    btnStartDreamExercise.addEventListener("click", () => {
      if (getIsLoading()) return;
      const actionCode = actionCodeFromState("ui_action_dream_start_exercise");
      if (!actionCode) {
        console.warn("[ui_action_missing]", { state_key: "ui_action_dream_start_exercise" });
        setInlineNotice(
          uiStringFromContract("error.contract.body")
        );
        return;
      }
      callRunStep(actionCode);
    });
  }
  var btnSwitchToSelfDream = document.getElementById("btnSwitchToSelfDream");
  if (btnSwitchToSelfDream) {
    btnSwitchToSelfDream.addEventListener("click", () => {
      if (getIsLoading()) return;
      const actionCode = actionCodeFromState("ui_action_dream_switch_to_self");
      if (!actionCode) {
        console.warn("[ui_action_missing]", { state_key: "ui_action_dream_switch_to_self" });
        setInlineNotice(
          uiStringFromContract("error.contract.body")
        );
        return;
      }
      callRunStep(actionCode);
    });
  }
  if (typeof window !== "undefined") {
    window.addEventListener("openai:set_globals", () => {
      try {
        const payload = readSetGlobalsPayloadFromHost();
        if (payload && typeof payload === "object" && Object.keys(payload).length > 0) {
          ingestHostPayload(payload, "set_globals");
          notifyHostTransportSignal("set_globals");
        } else {
          if (hasRenderedStateSnapshot()) {
            console.log("[startup_set_globals_empty_payload_ignored]", {
              reason: "cached_state_available",
              current_step: String(latestWidgetState().current_step || "")
            });
          } else {
            console.log("[startup_set_globals_empty_payload_ignored]", {
              reason: "awaiting_first_payload"
            });
          }
        }
      } catch (e) {
        console.error(e);
      } finally {
        if (getIsLoading()) setLoading(false);
      }
    });
  }
  ensureLocalDevOpenAiShim();
  const initialIngested = tryInitialIngestFromHost("set_globals");
  if (!initialIngested && isLocalDev) {
    callToolViaLocalMcp("run_step", {
      current_step_id: "step_0",
      user_message: "",
      input_mode: "widget",
      state: {}
    }).then((payload) => {
      ingestHostPayload(payload, "set_globals");
      notifyHostTransportSignal("set_globals");
    }).catch((err) => {
      console.error("[local_dev_initial_ingest_failed]", String(err?.message || err || "unknown"));
    });
  }
})();

</script>
  </body>
</html>
