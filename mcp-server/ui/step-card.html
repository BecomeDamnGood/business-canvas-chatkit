<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Strategy Canvas Builder</title>
    <style>
      :root{
        --text:#0f172a;
        --muted:#64748b;
        --line:#e5e7eb;
        --bg:#ffffff;
        --card:#ffffff;
        --shadow:0 10px 30px rgba(15,23,42,0.06);
        --blue:#2f5bea;
        --stepOff:#eef2f7;
      }
      *{ box-sizing:border-box; }
      body{
        margin:0;
        padding:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color:var(--text);
        background:var(--bg);
      }
      .wrap{
        max-width: 1080px;
        margin: 0 auto;
        padding: 36px 20px 60px;
      }
      .title{
        text-align:center;
        font-size: 46px;
        letter-spacing: -0.02em;
        margin: 10px 0 6px;
        font-weight: 800;
      }
      .subtitle{
        text-align:center;
        font-size: 22px;
        color: var(--muted);
        margin: 0 0 26px;
        font-weight: 500;
      }

      .stepperRow{
        display:flex;
        align-items:center;
        justify-content:center;
        margin: 18px 0 22px;
      }
      .stepper{
        display:flex;
        align-items:center;
        justify-content:center;
        gap: 0px;
      }
      .step{
        width: 56px;
        height: 56px;
        border-radius: 999px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight: 800;
        font-size: 18px;
        background: var(--stepOff);
        color: #64748b;
      }
      .step.active{
        background: var(--blue);
        color: white;
        box-shadow: 0 0 0 6px rgba(47,91,234,0.12);
      }
      .stepLine{
        width: 68px;
        height: 2px;
        background: var(--line);
      }

      .sectionTitle{
        text-align:center;
        font-size: 30px;
        font-weight: 900;
        margin: 8px 0 22px;
      }

      .card{
        max-width: 920px;
        margin: 0 auto;
        border-radius: 28px;
        border: 2px solid rgba(142,166,255,0.55);
        padding: 28px 28px 26px;
        background: var(--card);
        box-shadow: var(--shadow);
      }
      .cardInner{
        display:flex;
        align-items:flex-start;
        gap: 18px;
      }
      .badge{
        width: 64px;
        height: 64px;
        border-radius: 999px;
        background: var(--blue);
        color: white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight: 900;
        font-size: 20px;
        flex: 0 0 auto;
      }
      .cardTitle{
        margin: 6px 0 6px;
        font-size: 34px;
        font-weight: 950;
        letter-spacing: -0.01em;
      }
      .cardDesc{
        margin: 0 0 18px;
        font-size: 22px;
        line-height: 1.45;
        color: var(--muted);
        max-width: 720px;
      }
      .prompt{
        font-size: 28px;
        font-weight: 900;
        margin: 12px 0 14px;
        letter-spacing: -0.01em;
        white-space: pre-wrap;
      }

      .inputWrap{
        display:flex;
        align-items:flex-end;
        gap: 12px;
        margin-top: 8px;
      }
      textarea{
        width: 100%;
        min-height: 92px;
        resize: vertical;
        border-radius: 18px;
        border: 1px solid var(--line);
        padding: 18px 18px;
        font-size: 18px;
        outline: none;
      }
      .send{
        width: 64px;
        height: 64px;
        border: none;
        border-radius: 18px;
        background: rgba(142,166,255,0.85);
        color: white;
        cursor: pointer;
        display:flex;
        align-items:center;
        justify-content:center;
      }
      .send svg{ width: 26px; height: 26px; }

      .row{
        display:flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      .btn{
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.primary{
        border-color: rgba(47,91,234,0.25);
        background: rgba(47,91,234,0.08);
      }
      .status{
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        white-space: pre-wrap;
      }
      @media (max-width: 720px){
        .title{ font-size: 34px; }
        .subtitle{ font-size: 18px; }
        .cardTitle{ font-size: 26px; }
        .cardDesc{ font-size: 18px; }
        .prompt{ font-size: 22px; }
        .step{ width: 46px; height: 46px; }
        .stepLine{ width: 34px; }
        .badge{ width: 54px; height: 54px; }
        .send{ width: 56px; height: 56px; border-radius: 16px; }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="title" id="uiTitle">Business Strategy Canvas Builder</div>
      <div class="subtitle" id="uiSubtitle">Build your strategic foundation step by step</div>

      <div class="stepperRow">
        <div class="stepper" id="stepper"></div>
      </div>

      <div class="sectionTitle" id="sectionTitle">Validation & Business Name</div>

      <div class="card">
        <div class="cardInner">
          <div class="badge" id="badge">1</div>
          <div style="flex:1">
            <div class="cardTitle" id="cardTitle">Validation & Business Name</div>

            <!-- Forced description -->
            <div class="cardDesc" id="cardDesc">
              Please share your company name and the kind of business it is to get started.
            </div>

            <div class="prompt" id="prompt">…</div>

            <div class="inputWrap">
              <textarea id="input" placeholder="Type here your answer..."></textarea>
              <button class="send" id="send" title="Send">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 11.5L21 3L12.5 21L11 13L3 11.5Z" fill="currentColor"/>
                </svg>
              </button>
            </div>

            <div class="row" id="quickBtns" style="display:none">
              <button class="btn primary" id="btnYes">Yes</button>
              <button class="btn" id="btnNo">No</button>
            </div>

            <div class="status" id="status"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function pickData() {
        return (
          (globalThis.__SKYBRIDGE__ && globalThis.__SKYBRIDGE__.data) ||
          globalThis.skybridgeData ||
          globalThis.templateData ||
          {}
        );
      }

      const ORDER = ["step_0","dream","purpose","bigwhy","role","entity","strategy","rulesofthegame","presentation"];
      const TITLES = {
        step_0: "Validation & Business Name",
        dream: "Dream",
        purpose: "Purpose",
        bigwhy: "Big Why",
        role: "Role",
        entity: "Entity",
        strategy: "Strategy",
        rulesofthegame: "Rules of the game",
        presentation: "Presentation"
      };

      function stepIndex(stepId) {
        const idx = ORDER.indexOf(stepId);
        return idx >= 0 ? idx : 0;
      }

      function buildStepper(activeIdx) {
        const el = document.getElementById("stepper");
        el.innerHTML = "";
        for (let i = 0; i < 9; i++) {
          const s = document.createElement("div");
          s.className = "step" + (i === activeIdx ? " active" : "");
          s.textContent = String(i + 1);
          el.appendChild(s);
          if (i < 8) {
            const line = document.createElement("div");
            line.className = "stepLine";
            el.appendChild(line);
          }
        }
      }

      function pickPrompt(ui) {
        const specialist = (ui && ui.specialist) || {};
        const c = String(specialist.confirmation_question || "").trim();
        const q = String(specialist.question || "").trim();
        return c || q || String(ui.text || "").trim();
      }

      function shouldShowYesNo(ui) {
        const specialist = (ui && ui.specialist) || {};
        const c = String(specialist.confirmation_question || "").trim();
        return Boolean(c);
      }

      // Render
      const data = pickData();
      const ui = (data && data.ui && data.ui.result) ? data.ui.result : (data.ui || data.result || {});
      const state = (ui && ui.state) ? ui.state : {};
      const current = state.current_step || "step_0";
      const idx = stepIndex(current);

      buildStepper(idx);

      document.getElementById("badge").textContent = String(idx + 1);
      document.getElementById("sectionTitle").textContent = TITLES[current] || "Step";
      document.getElementById("cardTitle").textContent = TITLES[current] || "Step";

      // Force the description for step_0; can be expanded later for other steps
      if (current === "step_0") {
        document.getElementById("cardDesc").textContent =
          "Please share your company name and the kind of business it is to get started.";
      } else {
        document.getElementById("cardDesc").textContent = "";
      }

      document.getElementById("prompt").textContent = pickPrompt(ui) || "";

      const quick = document.getElementById("quickBtns");
      quick.style.display = shouldShowYesNo(ui) ? "flex" : "none";

      document.getElementById("status").textContent =
        (data.meta || "") + (data.meta ? "\n" : "") + "templateUrl: /ui/step-card";

      // Optional: allow UI to call tool if host supports it.
      // If not available, user can still answer in chat and the tool can be called again.
      async function callRunStep(message) {
        if (!globalThis.openai || !globalThis.openai.callTool) {
          document.getElementById("status").textContent =
            "This UI can’t call tools in this host. Please type your answer in chat.";
          return;
        }
        const payload = {
          current_step_id: state.current_step || "step_0",
          user_message: message,
          state: state || {}
        };
        await globalThis.openai.callTool("run_step", payload);
      }

      document.getElementById("send").addEventListener("click", () => {
        const v = (document.getElementById("input").value || "").trim();
        if (!v) return;
        document.getElementById("input").value = "";
        callRunStep(v);
      });

      document.getElementById("btnYes").addEventListener("click", () => callRunStep("yes"));
      document.getElementById("btnNo").addEventListener("click", () => callRunStep("no"));
    </script>
  </body>
</html>
