<!doctype html>
<html data-ui-version="__UI_VERSION__">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230071e3'/></svg>" type="image/svg+xml" />
    <title>The Business Strategy Canvas Builder</title>
    <style>
      /**
       * Redesign tokens – light only, 768px base.
       * Legacy names (--text, --muted, --line, --bg, --card, --shadow, --blue, --stepOff)
       * match mcp-server/ui/step-card.template.html for drop-in replacement.
       */
      
      :root {
        /* Legacy (widget compatibility) */
        --text: #1d1d1f;
        --muted: #6e6e73;
        --line: #e5e5ea;
        --bg: #f5f5f7;
        --card: #ffffff;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        --blue: #2b83e6;
        --stepOff: #e8e8ed;
      
        /* Color */
        --color-bg-page: #f5f5f7;
        --color-bg-surface: #ffffff;
        --color-brand-primary: #2b83e6;
        --color-brand-primary-soft: rgba(43, 131, 230, 0.9);
        --color-brand-primary-muted: rgba(43, 131, 230, 0.18);
        --color-brand-primary-subtle: rgba(43, 131, 230, 0.06);
        --color-brand-primary-border: rgba(43, 131, 230, 0.28);
        --color-brand-gradient-start: #63acff;
        --color-brand-gradient-end: #2b83e6;
        --color-text-primary: #1d1d1f;
        --color-text-secondary: #424245;
        --color-text-muted: #6e6e73;
        --color-text-placeholder: #86868b;
        --color-border-default: #e5e5ea;
        --color-ui-step-inactive-bg: #ffffff;
        --color-ui-step-inactive-text: #86868b;
        --color-ui-step-active-bg: #2b83e6;
        --color-ui-step-active-text: #ffffff;
        --color-ui-disabled-bg: #f5f5f7;
        --color-ui-disabled-text: #86868b;
        --color-placeholder-image-border: rgba(200, 150, 150, 0.6);
      
        /* Typography */
        --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-size-xs: 12px;
        --font-size-sm: 13px;
        --font-size-5: 14px;
        --font-size-base: 15px;
        --font-size-md: 16px;
        --font-size-lg: 17px;
        --font-size-xl: 18px;
        --font-size-2xl: 22px;
        --font-size-3xl: 26px;
        --font-size-4xl: 28px;
        --font-size-5xl: 40px;
        --font-weight-normal: 400;
        --font-weight-medium: 600;
        --font-weight-bold: 700;
        --font-weight-heavy: 800;
        --letter-spacing-tighter: -0.025em;
        --letter-spacing-tight: -0.015em;
        --letter-spacing-wide: 0.02em;
        --line-height-normal: 1.47;
        --line-height-relaxed: 1.5;
        --line-height-title: 1.2;
      
        /* Spacing */
        --space-0: 0;
        --space-1: 2px;
        --space-2: 4px;
        --space-3: 8px;
        --space-4: 12px;
        --space-5: 14px;
        --space-6: 16px;
        --space-8: 20px;
        --space-10: 24px;
        --space-12: 28px;
        --space-15: 32px;
        --space-16: 40px;
        --space-20: 64px;
      
        /* Radius */
        --radius-sm: 8px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 18px;
        --radius-2xl: 20px;
        --radius-full: 50%;
      
        /* Card overlay (light theme: white at 55% over background) */
        --card-overlay-opacity: 0.55;
      
        /* Layout – 768px base, full-bleed background */
        --layout-base-width: 768px;
        --layout-wrap-max-width: 768px;
        --layout-wrap-padding: 0 24px 15px;
        --layout-container-max-width: 720px;
      
        /* Component */
        --component-step-size: 36px;
        --component-step-line-width: 12px;
        --component-step-line-height: 2px;
        --component-badge-size: 52px;
        --component-card-padding: 28px 24px 26px;
        --component-card-gap: 20px;
        --component-input-min-height: 96px;
        --component-input-padding: 18px;
        --component-send-size: 48px;
        --component-send-radius: 12px;
        --component-choice-padding: 14px 18px;
        --component-thinking-bar-height: 48px;
      
        /* Motion */
        --duration-fast: 0.15s;
        --ease-default: ease;
      
        /* Breakpoints (for reference in media queries) */
        --breakpoint-mobile: 480px;
        --breakpoint-tablet: 768px;
      }
      
      /* Wider viewports: allow content to grow slightly, background still full bleed */
      @media (min-width: 900px) {
        :root {
          --layout-wrap-max-width: 860px;
          --layout-container-max-width: 820px;
        }
      }
      
      @media (min-width: 1100px) {
        :root {
          --layout-wrap-max-width: 960px;
          --layout-container-max-width: 920px;
        }
      }
      
      /* Mobile: comfortable text and touch, no shrinking */
      @media (max-width: 480px) {
        :root {
          --layout-wrap-padding: 20px 16px 15px;
          --font-size-5xl: 28px;
          --font-size-3xl: 22px;
          --font-size-2xl: 18px;
          --font-size-xl: 16px;
          --component-step-size: 32px;
          --component-step-line-width: 8px;
          --component-badge-size: 44px;
          --component-card-padding: 20px 16px 20px;
          --component-send-size: 48px;
        }
      }
      /**
       * Base styles – full-bleed background, body, layout.
       * Background always stretches to outer canvas; content in max-width container.
       */
      
      * {
        box-sizing: border-box;
      }
      
      /* Form elements: inherit font from page so <button>/<input> don't fall back
         to the browser's UA stylesheet (which defaults to ~13.3px). */
      button, input, select, textarea {
        font: inherit;
      }
      
      html {
        min-height: 100%;
      }
      
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-sans);
        font-weight: var(--font-weight-normal);
        color: var(--text);
        line-height: var(--line-height-normal);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

      @media (min-width: 769px) {
        body {
          background-attachment: fixed;
        }
      }
      
      :focus {
        outline: none;
      }
      :focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }
      
      /* Content wrapper – max-width, centered; background extends behind it */
      .wrap {
        max-width: var(--layout-wrap-max-width);
        margin: 0 auto;
        padding: var(--layout-wrap-padding);
        position: relative;
      }
      
      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .wrap {
          max-width: none;
          padding: 0;
        }
      }
      /**
       * Redesign components – same selectors/IDs as step-card.template.html.
       * Light-only; 768px base; full-bleed header and thinking bar.
       */
      
      /* ─── Page header (full-bleed; same background as body, no dark strip) ─── */
      .page-header {
        width: 100%;
        background: transparent;
        color: var(--text);
        padding: 0;
        margin-bottom: 10px;
        position: relative;
      }
      
      .page-header .wrap {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        padding: 20px 24px 20px;
        max-width: var(--layout-container-max-width);
        margin: 0 auto;
        background: rgba(255, 255, 255, var(--card-overlay-opacity, 0.55));
        border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
        box-shadow: var(--shadow);
        border: 1px solid var(--color-border-default);
        border-top: none;
      }
      
      .page-header .title,
      .page-header .subtitle,
      .page-header .byline {
        color: inherit;
      }
      
      /* Title – flows in grid row 1, pushes stepper down naturally when wrapping */
      .page-header .title {
        grid-column: 1;
        grid-row: 1;
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-medium);
        letter-spacing: var(--letter-spacing-tighter);
        line-height: var(--line-height-title);
        margin: 0;
        padding-right: 16px;
      }
      
      .title {
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-medium);
        letter-spacing: var(--letter-spacing-tighter);
        line-height: var(--line-height-title);
        margin: 0 0 var(--space-2);
        max-width: 100%;
      }
      
      .subtitle {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
        margin: 0 0 var(--space-6);
        font-weight: var(--font-weight-medium);
      }
      
      /* Subtitle placed after card in .wrap container */
      .subtitle {
        text-align: center;
        color: #2b83e6;
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        margin: 13px 0 0;
        padding: 0;
        display: block;
      }
      
      /* Byline – flows in grid row 1 col 2 (right of title) */
      .page-header .byline {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: var(--space-1);
        margin: 0;
        font-size: var(--font-size-5);
        font-weight: var(--font-weight-medium);
        color: var(--color-text-secondary);
      }
      
      .byline {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: var(--space-1);
        margin: 0;
        font-size: var(--font-size-5);
        font-weight: var(--font-weight-medium);
        color: var(--color-text-secondary);
      }
      
      /* "A business model by" is in the SVG; hide the separate text in redesign */
      .byline #byText {
        display: none;
      }
      
      .page-header .byline img,
      .page-header .byline svg {
        width: 126px;
        height: auto;
        display: block;
        margin-top: 5px;
      }
      
      .byline img,
      .byline svg {
        width: 126px;
        height: auto;
        display: block;
      }
      
      .byline .bylineName {
        font-size: var(--font-size-md);
        font-weight: var(--font-weight-medium);
        color: var(--text);
      }
      
      .byline .bylineTagline {
        font-size: var(--font-size-xs);
        letter-spacing: var(--letter-spacing-wide);
        color: var(--muted);
      }
      
      /* ─── Stepper row: step title above + 11 steps; in header, inside 55% rounded block, no connecting lines ─── */
      .stepperRow {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
      }
      
      /* Header stepper row – visual container is now .page-header .wrap */
      .page-header .stepperRow {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        padding: 0;
        margin: 0;
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      
      .page-header .stepper {
        justify-content: space-between;
        width: 100%;
        gap: 4px;
        margin-top: 32px; /* room for stepperTitle label above active step */
      }
      
      .page-header .stepLine {
        display: none;
      }
      
      .stepperTitle {
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-normal);
        color: var(--text);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        margin: 0 0 6px 0;
        white-space: nowrap;
        width: auto;
        min-width: max-content;
        pointer-events: none; /* Prevent interfering with clicks if it overlaps */
      }
      
      .stepperTitle.align-left {
        left: 0;
        transform: none;
        text-align: left;
      }
      
      .stepperTitle.align-right {
        left: auto;
        right: 0;
        transform: none;
        text-align: right;
      }
      
      .stepper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        flex-wrap: nowrap;
      }
      
      /* Step: number only + 5px bar underneath; no circles */
      .step {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: auto;
        min-width: 1.6em;
        font-weight: var(--font-weight-normal);
        font-size: var(--font-size-sm);
        font-variant-numeric: tabular-nums;
        color: #6e6e73;
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      
      .step::before {
        content: "";
        display: block;
        width: 56px;
        height: 5px;
        margin-bottom: 6px;
        border-radius: 3px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }
      
      .step.active {
        font-weight: var(--font-weight-medium);
        color: #1d1d20;
        background: transparent;
        border: none;
        box-shadow: none;
      }
      
      .step.active::before {
        background: #2b83e6;
        border-color: #2b83e6;
      }
      
      .step.completed::before {
        background: #2b83e6;
        border-color: #2b83e6;
      }
      
      .stepLine {
        width: var(--component-step-line-width);
        height: var(--component-step-line-height);
        min-width: var(--component-step-line-width);
        background: var(--line);
      }
      
      /* Steps: flex to fill equal space so bars scale down on narrow viewports */
      .page-header .step {
        flex: 1 1 0;
        min-width: 0;
        font-weight: var(--font-weight-normal);
        color: #6e6e73;
      }
      
      .page-header .step.active {
        font-weight: var(--font-weight-medium);
        color: #1d1d20;
      }
      
      .page-header .step::before {
        width: 100%;
        max-width: 56px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      }
      
      .page-header .step.active::before {
        background: #2b83e6;
        border-color: #2b83e6;
      }
      
      .page-header .step.completed::before {
        background: #2b83e6;
        border-color: #2b83e6;
      }
      
      .page-header .stepLine {
        display: none;
      }
      
      /* ─── Section title (inside card, next to badge) ─── */
      /* Visible when a main step starts. Hidden during substeps so cardDesc moves up. */
      .sectionTitle {
        font-size: var(--font-size-3xl);
        font-weight: var(--font-weight-medium);
        margin: 0 0 var(--space-3);
        color: var(--text);
        line-height: 1;
      }
      
      /* Collapse when empty (substep) – content below shifts up naturally */
      .sectionTitle:empty {
        display: none;
      }
      
      /* Programmatic hide via hidden attribute */
      .sectionTitle[hidden] {
        display: none !important;
        margin: 0;
      }
      
      /* ─── Card ─── */
      .card {
        max-width: var(--layout-container-max-width);
        margin: 0 auto;
        padding: var(--component-card-padding);
        background: rgba(255, 255, 255, var(--card-overlay-opacity, 0.55));
        border-radius: var(--radius-2xl);
        box-shadow: var(--shadow);
        border: 1px solid var(--color-border-default);
      }
      
      .cardInner {
        display: flex;
        align-items: flex-start;
        gap: var(--component-card-gap);
      }
      
      .cardInner > div:last-child {
        flex: 1;
        min-width: 0;
      }
      
      /* Badge: step number only + 5px blue bar underneath; no circle */
      .badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: auto;
        min-width: 50px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        background: transparent;
        border: none;
        border-radius: 0;
        font-weight: var(--font-weight-medium);
        font-size: var(--font-size-3xl);
        line-height: 1;
        flex: 0 0 auto;
        position: relative;
      }
      
      .badge::after {
        content: "";
        display: block;
        width: 50px;
        height: 5px;
        margin-top: 4px;
        border-radius: 3px;
        background: #2b83e6;
        position: relative;
        overflow: hidden;
      }
      
      /* Knight Rider animation for thinking state */
      .badge.loading::after {
        background: rgba(43, 131, 230, 0.2);
      }
      
      .badge.loading::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 5px;
        border-radius: 3px;
        overflow: hidden;
        pointer-events: none;
      }
      
      .badge.loading::before {
        background: linear-gradient(90deg, transparent, transparent 0px, var(--blue) 13px, transparent 37px, transparent);
        background-size: 50px 5px;
        background-position: -24px 0;
        background-repeat: no-repeat;
        animation: badgeKnightRider 2s ease-in-out infinite;
      }
      
      @keyframes badgeKnightRider {
        0% { background-position: -24px 0; }
        50% { background-position: 24px 0; }
        100% { background-position: -24px 0; }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .badge.loading::before {
          animation: none;
          background-position: 0 0;
        }
      }
      
      .cardTitle {
        display: none;
      }
      
      .presentationPreview {
        display: none;
        margin-top: var(--space-4);
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }
      
      .presentationPreview.visible {
        display: block;
      }
      
      .presentationThumbLink {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }
      
      .presentationThumb {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
        border-radius: var(--radius-md);
        object-fit: contain;
      }
      
      .presentationActions {
        margin-top: var(--space-4);
      }
      
      .presentationDownload {
        display: inline-block;
        border: 1px solid var(--color-brand-primary-border);
        background: var(--color-brand-primary-subtle);
        color: #2b83e6;
        border-radius: 999px;
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-md);
        font-weight: var(--font-weight-medium);
        cursor: pointer;
        font-family: var(--font-sans);
        text-decoration: none;
        transition: background-color var(--duration-fast) var(--ease-default), 
                    border-color var(--duration-fast) var(--ease-default), 
                    color var(--duration-fast) var(--ease-default);
      }
      
      .presentationDownload:hover {
        opacity: 0.9;
      }
      
      .cardDesc {
        margin: 0;
        padding: 0;
        font-size: var(--font-size-lg);
        line-height: var(--line-height-relaxed);
        color: var(--color-text-secondary);
        max-width: 100%;
        white-space: pre-line;
      }

      .inlineNotice {
        margin-top: var(--space-3);
        padding: var(--space-3) var(--space-4);
        font-size: var(--font-size-md);
        line-height: var(--line-height-relaxed);
        color: #6b4f00;
        background: #fff3cd;
        border: 1px solid #ffe08a;
        border-radius: var(--radius-md);
        display: none;
      }
      
      .cardDesc ul {
        margin: 0;
        padding-left: 0;
        list-style-position: inside;
      }
      
      .cardDesc ul br:first-child {
        display: none;
      }
      
      .cardDesc li {
        margin: 0;
        padding-left: 0;
      }
      
      /* ─── Image placeholder (OPTIONAL) ─── */
      /* Design-time placeholder between cardDesc paragraphs.
         Safe to omit entirely – content flows normally without it.
         When present, shows a dashed outline where a future image will go. */
      .cardDesc-image-placeholder {
        min-height: 90px;
        margin: var(--space-4) 0 var(--space-6);
        border: 2px dashed var(--color-placeholder-image-border);
        border-radius: var(--radius-md);
        background: none;
      }
      
      /* Hide placeholder programmatically without removing from DOM */
      .cardDesc-image-placeholder[hidden] {
        display: none !important;
        margin: 0;
      }
      
      /* Actual image in cardDesc after first paragraph (see IMAGE-INSERTION-IMPLEMENTATION.md) */
      .cardDesc-image {
        display: block;
        width: 100%;
        height: auto;
        margin: var(--space-4) 0;
        border-radius: var(--radius-md);
        object-fit: cover;
      }
      
      /* Paragraph styling when cardDesc uses innerHTML with images */
      .cardDesc-para {
        margin: 0 0 var(--space-4);
        font-size: var(--font-size-lg);
        line-height: var(--line-height-relaxed);
        color: var(--color-text-secondary);
        white-space: pre-wrap;
      }
      
      .cardDesc-para:last-child {
        margin-bottom: 0;
      }
      
      /* ─── Statements panel ─── */
      .statementsPanel {
        margin-top: var(--space-5);
        margin-bottom: var(--space-5);
      }
      
      .statementsTitle {
        font-weight: var(--font-weight-medium);
        font-size: var(--font-size-md);
        color: var(--text);
        margin-bottom: var(--space-2);
      }
      
      .statementsCount {
        font-size: var(--font-size-5);
        color: var(--muted);
        margin-bottom: var(--space-3);
      }
      
      .statementsList {
        font-size: var(--font-size-base);
        line-height: var(--line-height-normal);
        color: var(--text);
        white-space: pre-wrap;
      }
      
      /* ─── Scoring panel ─── */
      .scoringPanel {
        display: none;
        margin-top: var(--space-5);
        margin-bottom: var(--space-5);
        max-width: 100%;
      }
      
      .scoringPanel.visible {
        display: block;
      }
      
      .scoringIntro {
        font-size: var(--font-size-xl);
        line-height: var(--line-height-relaxed);
        color: var(--muted);
        margin-bottom: var(--space-8);
        white-space: pre-wrap;
      }
      
      .scoringCluster {
        margin-bottom: var(--space-10);
      }
      
      .scoringClusterHeader {
        font-weight: var(--font-weight-medium);
        font-size: var(--font-size-md);
        color: var(--text);
        margin-bottom: var(--space-3);
        display: flex;
        align-items: center;
        gap: var(--space-4);
        flex-wrap: wrap;
      }
      
      .scoringClusterHeader .themeName {
        flex: 1 1 auto;
      }
      
      .scoringClusterHeader .avgScore,
      .scoringClusterHeader .filledCount {
        color: var(--muted);
        font-size: var(--font-size-5);
        font-weight: var(--font-weight-medium);
      }
      
      .scoringClusterRows {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }
      
      .scoringRow {
        display: flex;
        align-items: center;
        gap: var(--space-4);
      }
      
      .scoringRow .statementText {
        flex: 1 1 auto;
        font-size: var(--font-size-base);
        line-height: 1.4;
        color: var(--text);
      }
      
      .scoringRow input.scoreInput {
        width: 56px;
        min-width: 56px;
        padding: var(--space-3) var(--space-4);
        font-size: var(--font-size-md);
        text-align: center;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
      }
      
      .scoringRow input.scoreInput:focus {
        outline: none;
        border-color: var(--blue);
      }
      
      .scoringContinueWrap {
        margin-top: var(--space-10);
      }
      
      .scoringContinueWrap .btn {
        min-width: 140px;
      }
      
      .scoringContinueWrap .btn:disabled {
        opacity: 1;
        cursor: not-allowed;
      }
      
      /* ─── Prompt ─── */
      .prompt {
        font-size: var(--font-size-2xl);
        font-weight: var(--font-weight-medium);
        margin: var(--space-4) 0 var(--space-4);
        letter-spacing: var(--letter-spacing-tight);
        white-space: pre-wrap;
        color: var(--text);
      }
      
      /* ─── Input + Send (textbox background: top-right, no scale) ─── */
      .inputWrap {
        display: flex;
        align-items: flex-end;
        gap: var(--space-4);
        margin-top: var(--space-4);
      }

        width: 100%;
        min-height: var(--component-input-min-height);
        padding: var(--component-input-padding);

        border: 1px solid var(--line);
        border-radius: var(--radius-xl);

      .inputWrap textarea::placeholder {
        color: var(--color-text-placeholder);
      }
      
      .inputWrap textarea:disabled {
        background-color: var(--color-ui-disabled-bg);
        background-image: none;
        color: var(--color-text-placeholder);
        cursor: not-allowed;
      }
      
      /* Send button – blue gradient + icon from assets */
      .send {
        width: var(--component-send-size);
        height: var(--component-send-size);
        min-width: var(--component-send-size);
        min-height: var(--component-send-size);
        border: none;
        border-radius: var(--component-send-radius);
        background: linear-gradient(180deg, var(--color-brand-gradient-start), var(--color-brand-gradient-end));
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity var(--duration-fast) var(--ease-default);
      }
      
      .send:hover:not(:disabled) {
        opacity: 0.95;
      }
      
      .send img,
      .send svg {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      
      .send:disabled {
        background: var(--stepOff);
        color: var(--color-ui-disabled-text);
        cursor: not-allowed;
      }
      
      /* ─── Choice buttons (light blue bg, blue text, fully rounded, semi-bold) ─── */
      .choiceWrap {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
        margin-top: var(--space-4);
      }
      
      .choiceBtn {
        width: 100%;
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-md);
        font-weight: var(--font-weight-medium);
        text-align: left;
        border: 1px solid var(--color-brand-primary-border);
        border-radius: 999px; /* Fully rounded pill shape */
        background: var(--color-brand-primary-subtle);
        color: #2b83e6;
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background-color var(--duration-fast) var(--ease-default), border-color var(--duration-fast) var(--ease-default), color var(--duration-fast) var(--ease-default);
      }
      
      .choiceBtn:disabled {
        background: var(--color-ui-disabled-bg);
        border-color: var(--line);
        color: var(--color-ui-disabled-text);
        cursor: not-allowed;
      }
      
      .choiceError {
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }
      
      /* ─── Thinking (in-card text, for widget) ─── */
      .thinking {
        margin: 0;
        color: var(--muted);
        font-weight: var(--font-weight-medium);
      }
      
      /* ─── Thinking bar (hidden – animation lives on .badge.loading instead) ─── */
      /* HTML kept for widget compatibility; visually replaced by badge animation. */
      .thinking-bar {
        display: none;
      }
      
      body.has-thinking-bar {
        padding-bottom: 0;
      }
      
      /* ─── Controls row ─── */
      .row {
        display: flex;
        justify-content: flex-start;
        gap: var(--space-4);
        margin-top: var(--space-4);
        flex-wrap: wrap;
        align-items: flex-start;
      }
      
      .btn {
        display: inline-flex;
        justify-content: flex-start;
        text-align: left;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--text);
        border-radius: 999px;
        padding: var(--space-4) var(--space-5);
        font-size: var(--font-size-md);          /* 16px – explicit to avoid UA default */
        font-weight: var(--font-weight-medium);
        cursor: pointer;
        font-family: var(--font-sans);
        transition: background-color var(--duration-fast) var(--ease-default), border-color var(--duration-fast) var(--ease-default), color var(--duration-fast) var(--ease-default);
      }
      
      .btn.primary {
        border-color: var(--color-brand-primary-border);
        background: var(--color-brand-primary-subtle);
        color: #2b83e6;
      }
      
      .btn:disabled {
        background: var(--color-ui-disabled-bg);
        border-color: var(--line);
        color: var(--color-ui-disabled-text);
        cursor: not-allowed;
      }
      
      #btnStart {
        border-radius: 23px;
        width: fit-content;
        max-width: 100%;
      }
      
      .startHint {
        color: var(--muted);
        font-weight: var(--font-weight-medium);
        margin-left: var(--space-1);
      }
      
      /* ─── Status (hidden) ─── */
      .status {
        display: none;
      }
      
      /* ─── Debug overlay ─── */
      #debugOverlay {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 220px;
        overflow: auto;
        background: rgba(28, 28, 31, 0.94);
        color: #e8e8ed;
        font-family: ui-monospace, monospace;
        font-size: var(--font-size-xs);
        line-height: 1.35;
        padding: var(--space-4);
        border-top: 1px solid var(--line);
        white-space: pre-wrap;
        word-break: break-word;
        z-index: 100;
      }
      
      #debugOverlay.visible {
        display: block;
      }
      
      /* ─── Tablet: tighten header padding, scale down byline logo ─── */
      @media (max-width: 600px) {
        .page-header .wrap {
          padding: 16px 16px 16px;
        }
      
        .page-header .byline img,
        .page-header .byline svg {
          width: 100px;
        }
      }
      
      /* ─── Mobile: reflow, no shrinking text ─── */
      @media (max-width: 480px) {
        .page-header .wrap {
          grid-template-columns: 1fr;
          padding: 16px 16px 16px;
        }
      
        .page-header .title {
          padding-right: 0;
        }
      
        .page-header .byline {
          grid-column: 1;
          grid-row: 2;
          align-items: flex-start;
          margin-top: var(--space-2);
        }
      
        .page-header .stepperRow {
          grid-row: 3;
        }
      
        .page-header .stepper {
          margin-top: 28px;
        }
      
        .page-header .byline img,
        .page-header .byline svg {
          width: 100px;
        }
      
        .stepper {
          gap: 0;
        }
      
        .cardInner {
          flex-direction: column;
          align-items: flex-start;
        }
      
        .inputWrap {
          flex-direction: column;
          align-items: stretch;
        }
      
        .send {
          align-self: flex-end;
        }
      }
      
    </style>
  </head>

        const indices = clusters[ci].statement_indices || [];
        for (let si = 0; si < indices.length; si++) {
          if (scoringScores[ci][si] === void 0)
            scoringScores[ci][si] = "";
        }
        scoringScores[ci].length = indices.length;
      }
      scoringScores.length = clusters.length;
      const scoringClustersEl = document.getElementById("scoringClusters");
      if (!scoringClustersEl)
        return;
      scoringClustersEl.innerHTML = "";
      for (let cii = 0; cii < clusters.length; cii++) {
        const cluster = clusters[cii];
        const indices = cluster.statement_indices || [];
        const themeName = String(cluster.theme || "").trim() || "Category " + (cii + 1);
        const clusterDiv = document.createElement("div");
        clusterDiv.className = "scoringCluster";
        clusterDiv.setAttribute("data-cluster-index", String(cii));
        let filled = 0, sum = 0;
        for (let si = 0; si < indices.length; si++) {
          const v = scoringScores[cii][si];
          const n = Number(v);
          if (v !== "" && v !== void 0 && !isNaN(n) && n >= 1 && n <= 10) {
            filled++;
            sum += n;
          }
        }
        const avgText = filled === 0 ? "\u2014" : (sum / filled).toFixed(1);
        const showStats = filled > 0;
        const avgHtml = showStats ? '<span class="avgScore">' + t(lang, "scoringAvg").replace("X", avgText) + "</span>" : "";
        clusterDiv.innerHTML = '<div class="scoringClusterHeader"><span class="themeName">' + escapeHtml(themeName) + "</span>" + avgHtml + '</div><div class="scoringClusterRows"></div>';
        const rowsEl = clusterDiv.querySelector(".scoringClusterRows");
        for (let si = 0; si < indices.length; si++) {
          const stIdx = indices[si];
          const numIdx = typeof stIdx !== "number" ? parseInt(String(stIdx), 10) : stIdx;
          if (isNaN(numIdx) || numIdx < 0 || !statementsArray || numIdx >= statementsArray.length)
            continue;
          const stText = statementsArray[numIdx];
          const row = document.createElement("div");
          row.className = "scoringRow";
          const stSpan = document.createElement("span");
          stSpan.className = "statementText";
          stSpan.textContent = stText;
          const input2 = document.createElement("input");
          input2.type = "text";
          input2.inputMode = "numeric";
          input2.className = "scoreInput";
          input2.setAttribute("data-cluster", String(cii));
          input2.setAttribute("data-statement", String(si));
          const rawVal = scoringScores[cii][si];
          const numVal = rawVal !== "" && rawVal !== void 0 ? Number(rawVal) : NaN;
          input2.value = !isNaN(numVal) && numVal >= 1 && numVal <= 10 ? String(Math.round(numVal)) : "";
          input2.placeholder = "0";
          input2.setAttribute("aria-label", "Score 1 to 10");
          row.appendChild(stSpan);
          row.appendChild(input2);
          if (rowsEl)
            rowsEl.appendChild(row);
        }
        scoringClustersEl.appendChild(clusterDiv);
      }
      updateScoringDreamQuestionVisibility2();
      scoringClustersEl.querySelectorAll(".scoreInput").forEach((input2) => {
        input2.addEventListener("input", () => {
          const ci = parseInt(input2.getAttribute("data-cluster") || "0", 10);
          const si = parseInt(input2.getAttribute("data-statement") || "0", 10);
          let val = input2.value.trim();
          const n = Number(val);
          if (val !== "" && (isNaN(n) || n < 1 || n > 10)) {
            input2.value = "";
            val = "";
          } else if (val !== "" && n >= 1 && n <= 10) {
            input2.value = String(Math.round(n));
            val = input2.value;
          }
          scoringScores[ci][si] = val;
          updateScoringClusterHeader2(ci);
          const btnScoringContinue = document.getElementById("btnScoringContinue");
          if (btnScoringContinue)
            btnScoringContinue.disabled = !allScoringFilled2();
          updateScoringDreamQuestionVisibility2();
        });
      });
      const btnScoringContinueEl = document.getElementById("btnScoringContinue");
      if (btnScoringContinueEl) {
        btnScoringContinueEl.textContent = t(lang, "btnScoringContinue");
        btnScoringContinueEl.disabled = !allScoringFilled2();
        btnScoringContinueEl.onclick = () => {
          if (!allScoringFilled2() || getIsLoading())
            return;
          const payload = [];
          for (let ci = 0; ci < clusters.length; ci++) {
            const row = [];
            for (let si = 0; si < (scoringScores[ci] || []).length; si++) {
              const v = Number(scoringScores[ci][si]);
              row.push(isNaN(v) ? 0 : Math.max(1, Math.min(10, v)));
            }
            payload.push(row);
          }
          win.__dreamScoringScores = [];
          callRunStep(JSON.stringify({ action: "submit_scores", scores: payload }));
        };
      }
      globalThis.__BSC_LATEST__ = { state, lang };
      if (isLoading)
        setLoading(false);
      return;
    }
    const scoringPanelPost = document.getElementById("scoringPanel");
    if (scoringPanelPost) {
      scoringPanelPost.classList.remove("visible");
      scoringPanelPost.style.display = "none";
    }
    if (cardDescEl)
      cardDescEl.style.display = "block";
    const promptPost = document.getElementById("prompt");
    if (promptPost)
      promptPost.style.display = "block";
    if (isDreamDirectionView) {
      if (statementsPanelEl)
        statementsPanelEl.style.display = "none";
    } else if (current === "dream" && Array.isArray(statementsArray) && statementsArray.length > 0 && statementsArray.length < 20) {
      if (statementsPanelEl)
        statementsPanelEl.style.display = "block";
      if (statementsTitleEl)
        statementsTitleEl.textContent = t(lang, "dreamBuilder.statements.title");
      if (statementsCountEl)
        statementsCountEl.textContent = t(lang, "dreamBuilder.statements.count").replace("N", String(statementsArray.length));
      if (statementsListEl)
        statementsListEl.textContent = statementsArray.map((s, i) => i + 1 + ". " + String(s)).join("\n");
    } else {
      if (statementsPanelEl)
        statementsPanelEl.style.display = "none";
    }
    const { promptShown, choices } = extractChoicesFromPrompt(promptRaw);
    const choicesArr = Array.isArray(choices) ? choices : [];
    let promptText = isDreamDirectionView ? "" : promptShown || "";
    const choiceModeHasMenu = choicesArr.length >= 2 && choicesArr.length <= 6;
    if (!isDreamDirectionView && choiceModeHasMenu) {
      const trimmedPrompt = (promptText || "").trim();
      const looksLikeLegacyChooseLine = trimmedPrompt === "" || /^Choose\s+\d/.test(trimmedPrompt) || /^Kies\s+\d/.test(trimmedPrompt);
      if (looksLikeLegacyChooseLine) {
        promptText = t(lang, "generic.choicePrompt.shareOrOption");
      }
    }
    if (current === "purpose" && isIntroAction && promptText && promptText.includes("Please define your purpose or ask for more explanation.")) {
      const businessName = String(state?.business_name || "").trim();
      const hasBusinessName = businessName && businessName !== "" && businessName !== "TBD";
      promptText = hasBusinessName ? `Please define the purpose of ${businessName} or ask for more explanation.` : "Please define the purpose of your future company or ask for more explanation.";
    }
    if (current === "strategy") {
      const rawBusinessName = String(state?.business_name || "").trim();
      const hasBusinessName = rawBusinessName && rawBusinessName !== "" && rawBusinessName !== "TBD";
      const displayName = hasBusinessName ? rawBusinessName : "your future company";
      if (promptText === "Define your Strategy or choose an option.") {
        promptText = `Define the Strategy of ${displayName} or choose an option.`;
      } else if (promptText === "Is there more that you will always focus on?") {
        promptText = `Is there more that ${displayName} will always focus on?`;
      }
    }
    const promptEl = document.getElementById("prompt");
    if (promptEl)
      renderInlineText(promptEl, promptText || "");
    renderChoiceButtons(choicesArr, result);
    const choiceMode = choicesArr.length > 0;
    const confirmMode = !choiceMode && showContinue;
    let statementCount = (Array.isArray(statementsArray) ? statementsArray.length : 0) || 0;
    if (current === "dream" && activeSpecialist === "DreamExplainer" && statementCount < 20 && lastStatements.length >= 20) {
      statementCount = lastStatements.length;
    }
    const effectiveStatementsForButton = (Array.isArray(statementsArray) ? statementsArray.length : 0) || (Array.isArray(specialist.statements) ? specialist.statements.length : 0) || 0;
    const showGoToNextStep = current === "dream" && activeSpecialist === "DreamExplainer" && effectiveStatementsForButton >= 20 && String(specialist.action || "") !== "CONFIRM";
    inputWrap.style.display = "flex";
    const sde = document.getElementById("btnStartDreamExercise");
    const sb = document.getElementById("btnSwitchToSelfDream");
    if (choiceMode) {
      const choiceWrap = document.getElementById("choiceWrap");
      if (choiceWrap)
        choiceWrap.style.display = "flex";
      btnOk2.style.display = "none";
      if (sde)
        sde.style.display = "none";
      if (sb)
        sb.style.display = "none";
    } else if (confirmMode) {
      const choiceWrap = document.getElementById("choiceWrap");
      if (choiceWrap)
        choiceWrap.style.display = "none";
      btnOk2.style.display = "inline-flex";
      if (sde)
        sde.style.display = "none";
      if (sb)
        sb.style.display = "none";
    } else {
      const choiceWrap = document.getElementById("choiceWrap");
      if (choiceWrap)
        choiceWrap.style.display = "none";
      btnOk2.style.display = "none";
      if (sde) {
        sde.style.display = isDreamStepPreExercise ? "inline-flex" : "none";
      }
      if (sb) {
        sb.style.display = isDreamExplainerMode && String(specialist.action || "") !== "CONFIRM" ? "inline-flex" : "none";
      }
    }
    const btnGoToNextStepEl = document.getElementById("btnGoToNextStep");
    if (btnGoToNextStepEl) {
      btnGoToNextStepEl.style.display = showGoToNextStep && !getIsLoading() ? "inline-flex" : "none";
      btnGoToNextStepEl.disabled = getIsLoading();
    }
    const isDreamConfirm = current === "dream" && activeSpecialist === "DreamExplainer" && String(specialist.action || "") === "CONFIRM" && !choicesArr.length;
    const btnDreamConfirmEl = document.getElementById("btnDreamConfirm");
    if (btnDreamConfirmEl) {
      btnDreamConfirmEl.style.display = isDreamConfirm && !getIsLoading() ? "inline-flex" : "none";
      btnDreamConfirmEl.disabled = getIsLoading();
    }
    const debugMode = /\bdebug=1\b/.test(String(typeof window !== "undefined" ? window.location.search : ""));
    const debugEl = document.getElementById("debugOverlay");
    if (debugEl) {
      if (debugMode) {
        const debugPayload = {
          current_step: current,
          active_specialist: activeSpecialist,
          "specialist.action": String(specialist.action || ""),
          promptRaw200: (promptRaw || "").slice(0, 200),
          choicesLength: choicesArr.length,
          choiceLabels: choicesArr.map((c) => c.label),
          showContinue,
          isDreamStepPreExercise,
          isDreamExplainerMode,
          isLoading: getIsLoading()
        };
        debugEl.textContent = JSON.stringify(debugPayload, null, 2);
        debugEl.classList.add("visible");
        debugEl.setAttribute("aria-hidden", "false");
      } else {
        debugEl.textContent = "";
        debugEl.classList.remove("visible");
        debugEl.setAttribute("aria-hidden", "true");
      }
    }
    const btnGoToNextStepEl2 = document.getElementById("btnGoToNextStep");
    if (btnGoToNextStepEl2)
      btnGoToNextStepEl2.textContent = t(lang, "btnGoToNextStep");
    const btnStartDreamExerciseEl = document.getElementById("btnStartDreamExercise");
    if (btnStartDreamExerciseEl) {
      btnStartDreamExerciseEl.textContent = t(lang, "dreamBuilder.startExercise");
      btnStartDreamExerciseEl.disabled = getIsLoading();
    }
    const btnSwitchToSelfDreamEl = document.getElementById("btnSwitchToSelfDream");
    if (btnSwitchToSelfDreamEl) {
      btnSwitchToSelfDreamEl.textContent = t(lang, "btnSwitchToSelfDream");
      btnSwitchToSelfDreamEl.disabled = getIsLoading();
    }
    const btnDreamConfirmEl2 = document.getElementById("btnDreamConfirm");
    if (btnDreamConfirmEl2) {
      btnDreamConfirmEl2.textContent = t(lang, "btnDreamConfirm");
      btnDreamConfirmEl2.disabled = getIsLoading();
    }
    const input = document.getElementById("input");
    if (input)
      input.placeholder = t(lang, "inputPlaceholder");
    const inputVal = (document.getElementById("input")?.value || "").trim();
    setSendEnabled(inputVal.length > 0);
    globalThis.__BSC_LATEST__ = { state, lang };
    if (getIsLoading())
      setLoading(false);
  }

  // ui/lib/main.js
  initActionsConfig({ render, t });
  var isLocalDev = globalThis.LOCAL_DEV === "1";
  if (isLocalDev && typeof window !== "undefined") {
    const reportDevError = (message, file, line, col) => {
      const target = document.getElementById("status") || document.getElementById("uiSubtitle");
      if (!target)
        return;
      const parts = [message];
      if (file)
        parts.push(`@ ${file}${line ? ":" + line : ""}${col ? ":" + col : ""}`);
      target.textContent = `[ui_error] ${parts.join(" ")}`.trim();
    };
    window.addEventListener("error", (e) => {
      console.error("[ui_error]", e?.message, e?.filename, e?.lineno, e?.colno, e?.error?.stack);
      reportDevError(String(e?.message || "unknown error"), e?.filename, e?.lineno, e?.colno);
    });
    window.addEventListener("unhandledrejection", (e) => {
      const reason = e?.reason;
      console.error("[ui_rejection]", reason && reason.message ? reason.message : reason, reason && reason.stack ? reason.stack : "");
      reportDevError(String(reason && reason.message ? reason.message : reason || "unhandled rejection"));
    });
  }
  if (typeof window !== "undefined") {
    const extractToolResult = (params) => {
      if (!params || typeof params !== "object")
        return params;
      if ("result" in params)
        return params.result;
      if ("toolResult" in params)
        return params.toolResult;
      if ("output" in params)
        return params.output;
      return params;
    };
    window.addEventListener("message", (e) => {
      const data = e?.data;
      if (!data || typeof data !== "object")
        return;
      if (data.jsonrpc !== "2.0")
        return;
      const method = typeof data.method === "string" ? data.method : "";
      if (method.startsWith("ui/")) {
        setBridgeEnabled(true);
      }
      if (method === "ui/notifications/tool-result") {
        const payload = extractToolResult(data.params);
        const normalized = applyToolResult(payload);
        try {
          render(normalized);
        } catch (err) {
          console.error(err);
        } finally {
          if (getIsLoading())
            setLoading(false);
        }
        return;
      }
      if (data.id) {
        handleBridgeResponse(data);
        return;
      }
    });
  }
  var inputEl = document.getElementById("input");
  if (inputEl) {
    inputEl.addEventListener("input", () => {
      if (getIsLoading())
        return;
      const inputVal = (inputEl.value || "").trim();
      setSendEnabled(inputVal.length > 0);
    });
  }
  var sendEl = document.getElementById("send");
  if (sendEl) {
    sendEl.addEventListener("click", () => {
      if (getIsLoading())
        return;
      const input = document.getElementById("input");
      const inputVal = (input?.value || "").trim();
      if (!inputVal)
        return;
      const latest = globalThis.__BSC_LATEST__ || {};
      const st = latest.state || {};
      const win = globalThis;
      const isDreamScoringDirection = st.current_step === "dream" && String(st.active_specialist || "") === "DreamExplainer" && Array.isArray(win.__dreamScoringScores) && (win.__dreamScoringScores?.length ?? 0) > 0;
      if (isDreamScoringDirection) {
        const scoringScores = win.__dreamScoringScores || [];
        const payloadScores = [];
        for (let ci = 0; ci < scoringScores.length; ci++) {
          const row = scoringScores[ci] || [];
          const normRow = [];
          for (let si = 0; si < row.length; si++) {
            const v = Number(row[si]);
            normRow.push(isNaN(v) ? 0 : Math.max(1, Math.min(10, v)));
          }
          payloadScores.push(normRow);
        }
        if (input)
          input.value = "";
        setSendEnabled(false);
        win.__dreamScoringScores = [];
        callRunStep("ACTION_DREAM_EXPLAINER_SUBMIT_SCORES", { __pending_scores: payloadScores });
        return;
      }
      if (input)
        input.value = "";
      setSendEnabled(false);
      callRunStep("ACTION_TEXT_SUBMIT", { __text_submit: inputVal });
    });
  }
  var btnDreamConfirm = document.getElementById("btnDreamConfirm");
  if (btnDreamConfirm) {
    btnDreamConfirm.addEventListener("click", () => {
      if (getIsLoading())
        return;
      callRunStep("ACTION_DREAM_EXPLAINER_REFINE_CONFIRM");
    });
  }
  var btnStart = document.getElementById("btnStart");
  if (btnStart) {
    btnStart.addEventListener("click", () => {
      if (getIsLoading())
        return;
      setSessionStarted(true);
      setSessionWelcomeShown(false);
      setWidgetStateSafe({ started: "true" });
      render();
      if (!hasToolOutput()) {
        callRunStep("ACTION_START", { started: "true" });
      }
    });
  }
  var btnOk = document.getElementById("btnOk");
  if (btnOk) {
    btnOk.addEventListener("click", () => {
      if (getIsLoading())
        return;
      callRunStep("ACTION_CONFIRM_CONTINUE");
    });
  }
  var btnGoToNextStep = document.getElementById("btnGoToNextStep");
  if (btnGoToNextStep) {
    btnGoToNextStep.addEventListener("click", () => {
      if (getIsLoading())
        return;
      callRunStep("ACTION_DREAM_EXPLAINER_NEXT_STEP");
    });
  }
  var btnStartDreamExercise = document.getElementById("btnStartDreamExercise");
  if (btnStartDreamExercise) {
    btnStartDreamExercise.addEventListener("click", () => {
      if (getIsLoading())
        return;
      callRunStep("ACTION_CONFIRM_CONTINUE");
    });
  }
  var btnSwitchToSelfDream = document.getElementById("btnSwitchToSelfDream");
  if (btnSwitchToSelfDream) {
    btnSwitchToSelfDream.addEventListener("click", () => {
      if (getIsLoading())
        return;
      callRunStep("ACTION_DREAM_SWITCH_TO_SELF");
    });
  }
  if (typeof window !== "undefined") {
    window.addEventListener("openai:set_globals", () => {
      try {
        render();
      } catch (e) {
        console.error(e);
      } finally {
        if (getIsLoading())
          setLoading(false);
      }
    });
  }
  render();
})();
